<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Join — Screenshot Quiz Night</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0B0B1A;--surface:#141428;--surface2:#1C1C36;
  --purple:#7C6EF6;--purple-dim:#5B50C8;--purple-glow:rgba(124,110,246,.25);
  --coral:#FF5C8A;--gold:#FFB740;
  --text:#EEEEFF;--text-dim:#8888BB;--text-muted:#5555AA;
  --border:rgba(124,110,246,.15);
  --green:#3DDC84;--red:#FF4B5C;--red-bg:rgba(255,75,92,.12);
  --font-display:'Outfit',sans-serif;--font-mono:'Space Mono',monospace;
}
html,body{min-height:100vh;background:var(--bg);font-family:var(--font-display);color:var(--text);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,110,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(124,110,246,.03) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;z-index:0}
.hero{background:var(--surface);padding:1.75rem 1.5rem 1.5rem;text-align:center;position:relative;overflow:hidden;border-bottom:1px solid var(--border);flex-shrink:0}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 0%,rgba(124,110,246,.12) 0%,transparent 50%),radial-gradient(ellipse at 70% 0%,rgba(255,92,138,.08) 0%,transparent 50%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--purple),var(--coral),transparent)}
.hero-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:.65rem}
.hero-title{font-weight:900;font-size:1.6rem;color:#fff;letter-spacing:.06em;line-height:1.1;background:linear-gradient(135deg,var(--purple),var(--coral));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-tagline{font-size:11.5px;color:var(--text-dim);letter-spacing:.04em}
.hero-tagline span{display:inline-block;width:3px;height:3px;border-radius:50%;background:var(--purple);vertical-align:middle;margin:0 .6em;opacity:.5}
.sponsor-bar{background:linear-gradient(90deg,#E85D24 0%,#D14520 100%);padding:10px 20px;display:flex;align-items:center;justify-content:center;gap:12px;flex-shrink:0}
.sponsor-label{font-size:10px;font-weight:600;color:rgba(255,255,255,.75);letter-spacing:.1em;text-transform:uppercase}
.wrap{flex:1;display:flex;flex-direction:column;padding:1.25rem;gap:1rem;max-width:480px;margin:0 auto;width:100%;position:relative;z-index:1}
.card{background:var(--surface);border-radius:16px;padding:1.25rem;border:1px solid var(--border)}
.card-title{font-weight:800;font-size:1rem;color:var(--text);margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.flbl{font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem;display:block}
.finput{width:100%;padding:14px 16px;border-radius:12px;border:2px solid var(--border);background:var(--surface2);font-size:18px;color:var(--text);outline:none;font-family:var(--font-display);font-weight:600;transition:border-color .15s}
.finput:focus{border-color:var(--purple)}
.finput::placeholder{color:var(--text-muted)}
.alertbox{display:none;background:var(--red-bg);color:var(--red);border:1px solid rgba(255,75,92,.3);border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:.75rem;font-weight:600}
.alertbox.on{display:block}
/* Room code input */
.code-wrap{display:flex;gap:.5rem;justify-content:center;margin:1rem 0}
.code-char{width:60px;height:72px;border-radius:14px;border:2px solid var(--border);background:var(--surface2);font-size:28px;font-weight:900;color:var(--purple);text-align:center;font-family:var(--font-mono);text-transform:uppercase;outline:none;transition:border-color .15s;caret-color:var(--purple)}
.code-char:focus{border-color:var(--purple);box-shadow:0 0 16px var(--purple-glow)}
/* Player count */
.pcnt-wrap{display:flex;align-items:center;justify-content:center;gap:1.25rem;margin:.5rem 0}
.pcnt-btn{width:52px;height:52px;border-radius:50%;border:2px solid var(--border);background:var(--surface2);font-size:24px;font-weight:700;display:flex;align-items:center;justify-content:center;color:var(--purple);cursor:pointer;transition:all .15s;font-family:var(--font-display)}
.pcnt-btn:active{transform:scale(.92);background:var(--purple);color:#fff}
.pcnt-val{font-family:var(--font-mono);font-size:42px;font-weight:900;color:var(--purple);line-height:1;min-width:56px;text-align:center}
.pcnt-lbl{font-size:10px;color:var(--text-dim);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-top:2px;text-align:center}
/* Buttons */
.btn{width:100%;padding:17px;border-radius:14px;font-family:var(--font-display);font-size:17px;font-weight:900;display:block;min-height:58px;letter-spacing:.01em;transition:all .12s;cursor:pointer;border:none}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-coral{background:var(--coral);color:#fff;box-shadow:0 4px 20px rgba(255,92,138,.2)}
.btn-purple{background:var(--purple);color:#fff;box-shadow:0 4px 20px var(--purple-glow)}
/* Screens */
.scr{display:none;flex-direction:column;gap:1rem}.scr.on{display:flex}
/* Waiting */
.wait-card{background:var(--surface);border-radius:16px;padding:1.5rem;text-align:center;border:1px solid var(--border)}
.wait-badge{background:var(--green);color:#000;font-weight:900;font-size:.9rem;padding:.35rem 1.1rem;border-radius:20px;display:inline-block;margin-bottom:.75rem}
.pulse-ring{width:60px;height:60px;border-radius:50%;border:3px solid var(--purple);margin:1rem auto;animation:pulseRing 1.8s ease-in-out infinite;opacity:.5}
@keyframes pulseRing{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.15);opacity:.2}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.an{animation:fadeUp .3s ease}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-title">Screenshot Quiz Night</div>
    <div class="hero-tagline">Live Trivia<span></span>Win Prizes<span></span>Have Fun</div>
  </div>
</div>

<div class="sponsor-bar">
  <span class="sponsor-label">Brought to you by</span>
  <svg viewBox="0 0 200 50" style="height:32px;width:auto;">
    <text x="100" y="28" text-anchor="middle" font-family="Impact, Haettenschweiler, Arial Narrow Bold, sans-serif" font-size="28" fill="white" font-weight="bold" letter-spacing="2">CHILITOS</text>
    <text x="100" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.85)" letter-spacing="3">— JAMEXICAN FOOD —</text>
  </svg>
</div>

<div class="wrap">
  <!-- SCREEN 1: ROOM CODE ENTRY -->
  <div class="scr on" id="scr-code">
    <div class="card an">
      <div class="card-title">🎯 Enter Room Code</div>
      <div class="alertbox" id="alert-code"></div>
      <div class="code-wrap">
        <input class="code-char" id="c0" maxlength="1" autocomplete="off" autocapitalize="characters" inputmode="text">
        <input class="code-char" id="c1" maxlength="1" autocomplete="off" autocapitalize="characters" inputmode="text">
        <input class="code-char" id="c2" maxlength="1" autocomplete="off" autocapitalize="characters" inputmode="text">
        <input class="code-char" id="c3" maxlength="1" autocomplete="off" autocapitalize="characters" inputmode="text">
      </div>
      <div style="text-align:center;font-size:13px;color:var(--text-dim);margin-bottom:1rem">Enter the 4-letter code shown on the host screen</div>
      <button class="btn btn-purple" id="btn-check-code" onclick="checkCode()">Join Room →</button>
    </div>
  </div>

  <!-- SCREEN 2: REGISTRATION -->
  <div class="scr" id="scr-register">
    <div class="card an">
      <div class="card-title">📝 Register Your Team</div>
      <div style="background:rgba(124,110,246,.1);border-radius:10px;padding:.5rem .75rem;font-size:13px;color:var(--purple);font-weight:700;margin-bottom:1rem;text-align:center">Room: <span id="display-room-code" style="font-family:var(--font-mono)"></span></div>
      <div class="alertbox" id="alert-reg"></div>
      <label class="flbl">Email Address</label>
      <input id="f-email" class="finput" type="email" placeholder="your@email.com" maxlength="100">
      <div style="height:.8rem"></div>
      <label class="flbl">Team Name</label>
      <input id="f-tname" class="finput" type="text" placeholder="e.g. The Legends" maxlength="30">
      <div style="height:.8rem"></div>
      <label class="flbl">Number of Players (1–4)</label>
      <div class="pcnt-wrap">
        <button class="pcnt-btn" id="btn-minus">−</button>
        <div><div class="pcnt-val" id="cval">1</div><div class="pcnt-lbl" id="clbl">player</div></div>
        <button class="pcnt-btn" id="btn-plus">+</button>
      </div>
    </div>
    <button class="btn btn-coral" id="btn-register" onclick="registerTeam()">🎮 Join the Game! →</button>
  </div>

  <!-- SCREEN 3: WAITING -->
  <div class="scr" id="scr-waiting">
    <div class="wait-card an">
      <div class="wait-badge">You're in! ✓</div>
      <div style="font-size:3rem;margin-bottom:.5rem">⏳</div>
      <div style="font-weight:900;font-size:1.25rem;margin-bottom:.3rem" id="wait-title">Waiting for host...</div>
      <div style="font-size:13px;color:var(--text-dim);line-height:1.6" id="wait-sub">Sit tight — the host will start the game shortly!</div>
      <div class="pulse-ring"></div>
      <div style="font-size:13px;color:var(--text-dim)" id="wait-team"></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
var db = null;
var roomCode = null;
var pcnt = 1;
var PLAYER_APP_URL = 'index-v3.html';

try {
  firebase.initializeApp({
    apiKey: "AIzaSyBoxCE9DY4VCHiq8beeaGmX5237KiPuFWA",
    authDomain: "screenshot-trivia-night.firebaseapp.com",
    databaseURL: "https://screenshot-trivia-night-default-rtdb.firebaseio.com",
    projectId: "screenshot-trivia-night",
    storageBucket: "screenshot-trivia-night.firebasestorage.app",
    messagingSenderId: "482758352954",
    appId: "1:482758352954:web:832d1cba008bc0b789d503"
  });
  db = firebase.database();
} catch(e) { console.error(e); }

// ── SCREENS ──
function showScr(id) {
  ['scr-code','scr-register','scr-waiting'].forEach(function(s) {
    document.getElementById(s).classList.remove('on');
  });
  document.getElementById(id).classList.add('on');
}

function showAlert(id, msg) {
  var el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('on');
  setTimeout(function() { el.classList.remove('on'); }, 4000);
}

// ── CODE INPUT AUTO-ADVANCE ──
['c0','c1','c2','c3'].forEach(function(id, i) {
  var el = document.getElementById(id);
  el.addEventListener('input', function() {
    this.value = this.value.toUpperCase().replace(/[^A-Z]/g, '');
    if (this.value.length === 1 && i < 3) {
      document.getElementById('c' + (i + 1)).focus();
    }
    if (i === 3 && this.value.length === 1) {
      checkCode();
    }
  });
  el.addEventListener('keydown', function(e) {
    if (e.key === 'Backspace' && this.value === '' && i > 0) {
      document.getElementById('c' + (i - 1)).focus();
    }
  });
});

// ── PLAYER COUNT ──
document.getElementById('btn-minus').onclick = function() { if (pcnt > 1) { pcnt--; renderPcnt(); } };
document.getElementById('btn-plus').onclick = function() { if (pcnt < 4) { pcnt++; renderPcnt(); } };
function renderPcnt() {
  document.getElementById('cval').textContent = pcnt;
  document.getElementById('clbl').textContent = pcnt === 1 ? 'player' : 'players';
}

// ── CHECK CODE ──
function checkCode() {
  var code = '';
  for (var i = 0; i < 4; i++) code += (document.getElementById('c' + i).value || '');
  code = code.toUpperCase();
  if (code.length !== 4) { showAlert('alert-code', 'Please enter a 4-letter room code'); return; }

  if (!db) { showAlert('alert-code', 'Connection error. Please try again.'); return; }

  db.ref('games/' + code).once('value', function(snap) {
    var game = snap.val();
    if (!game) {
      showAlert('alert-code', 'Room not found. Check the code and try again.');
      return;
    }
    if (game.status === 'ended') {
      showAlert('alert-code', 'This game has already ended.');
      return;
    }
    roomCode = code;
    document.getElementById('display-room-code').textContent = roomCode;
    showScr('scr-register');
  });
}

// ── REGISTER TEAM ──
function registerTeam() {
  var email = document.getElementById('f-email').value.trim();
  var tname = document.getElementById('f-tname').value.trim();

  if (!email) { showAlert('alert-reg', 'Please enter your email address'); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showAlert('alert-reg', 'Please enter a valid email address'); return; }
  if (!tname) { showAlert('alert-reg', 'Please enter a team name'); return; }
  if (!db || !roomCode) return;

  var emailKey = email.replace(/[^a-zA-Z0-9]/g, '_');

  // Check for existing registration
  db.ref('games/' + roomCode + '/teams/' + emailKey).once('value', function(snap) {
    var existing = snap.val();
    if (existing) {
      // Rejoin flow
      tname = existing.name;
      saveSessionAndProceed(emailKey, email, tname, existing.players || pcnt);
      return;
    }

    // New registration
    var teamData = {
      name: tname,
      email: email,
      players: pcnt,
      status: 'waiting',
      joinedAt: Date.now(),
      currentRound: 1,
      currentQuestion: 0
    };
    db.ref('games/' + roomCode + '/teams/' + emailKey).set(teamData);

    // Legacy mirror
    db.ref('teams/' + tname.replace(/[^a-zA-Z0-9]/g, '_')).set({
      name: tname,
      players: pcnt,
      emails: [email],
      status: 'waiting',
      joinedAt: Date.now()
    });

    saveSessionAndProceed(emailKey, email, tname, pcnt);
  });
}

function saveSessionAndProceed(emailKey, email, tname, players) {
  // Save to localStorage for session persistence
  localStorage.setItem('sqn_session', JSON.stringify({
    room: roomCode,
    emailKey: emailKey,
    email: email,
    name: tname,
    players: players
  }));

  // Also save to sessionStorage for immediate redirect
  sessionStorage.setItem('trivia_team', JSON.stringify({
    name: tname,
    email: email,
    players: players,
    room: roomCode
  }));

  // Show waiting screen
  document.getElementById('wait-team').textContent = '🎮 Team: ' + tname + ' · Room: ' + roomCode;
  showScr('scr-waiting');

  // Listen for game start
  listenForGameStart();
}

// ── LISTEN FOR GAME START ──
function listenForGameStart() {
  if (!db || !roomCode) return;

  db.ref('games/' + roomCode + '/status').on('value', function(snap) {
    var status = snap.val();
    if (status === 'playing') {
      // Redirect to player app
      window.location.href = PLAYER_APP_URL + '?room=' + roomCode;
    }
  });
}

// ── URL PARAM HANDLING ──
(function() {
  var params = new URLSearchParams(window.location.search);
  var room = params.get('room');
  if (room && room.length === 4) {
    // Pre-fill room code
    var code = room.toUpperCase();
    for (var i = 0; i < 4; i++) {
      document.getElementById('c' + i).value = code[i] || '';
    }
    // Auto-check
    setTimeout(function() { checkCode(); }, 300);
  }

  // Check for existing session
  var saved = localStorage.getItem('sqn_session');
  if (saved) {
    try {
      var session = JSON.parse(saved);
      if (session.room && session.name) {
        // Check if game still exists
        if (db) {
          db.ref('games/' + session.room + '/status').once('value', function(snap) {
            var status = snap.val();
            if (status === 'playing') {
              // Game is live, redirect directly
              window.location.href = PLAYER_APP_URL + '?room=' + session.room;
            } else if (status === 'lobby') {
              // Game in lobby, go to waiting
              roomCode = session.room;
              document.getElementById('wait-team').textContent = '🎮 Team: ' + session.name + ' · Room: ' + session.room;
              showScr('scr-waiting');
              listenForGameStart();
            }
            // If ended or null, let them join a new game
          });
        }
      }
    } catch(e) {}
  }
})();
</script>
</body>
</html>
