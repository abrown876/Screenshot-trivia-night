<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Join — Screenshot Quiz Night</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --purple:#5B5BD6;--purpled:#3D3D9E;--purplel:#EEEEFF;
  --coral:#E8547A;--corall:#FDE8EE;
  --gold:#F5A623;--goldl:#FEF3DC;
  --bg:#F4F4FC;--card:#FFF;--text:#1A1A3E;--muted:#7A7AAA;--bd:#E0E0F0;
  --ok:#2D7A4F;--no:#C0392B;
  --r:16px;--sh:0 2px 12px rgba(91,91,214,.08)
}
html,body{min-height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column}
input,select,textarea{font-size:16px;-webkit-appearance:none;-webkit-user-select:text;user-select:text}
button{touch-action:manipulation;cursor:pointer}
.wrap{flex:1;display:flex;flex-direction:column;padding:1rem;gap:.85rem;max-width:900px;margin:0 auto;width:100%}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;align-items:start}
@media(max-width:500px){.cols{grid-template-columns:1fr}}
.hero{background:linear-gradient(135deg,var(--purple) 0%,var(--purpled) 100%);border-radius:var(--r);padding:1.1rem 1.25rem;text-align:center;position:relative;overflow:hidden;box-shadow:0 0 0 1px rgba(91,91,214,.4),0 0 32px rgba(91,91,214,.35),0 0 64px rgba(91,91,214,.15)}
.hero::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);background-size:28px 28px;pointer-events:none}
.hero::after{content:"";position:absolute;top:-40%;left:50%;transform:translateX(-50%);width:80%;height:200%;background:radial-gradient(ellipse at top,rgba(255,255,255,.12) 0%,transparent 60%);pointer-events:none}
.hero-inner{position:relative;z-index:1}
.card{background:var(--card);border-radius:var(--r);padding:1.25rem;box-shadow:var(--sh);border:1.5px solid var(--bd)}
.card-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;color:var(--text);margin-bottom:.85rem;display:flex;align-items:center;gap:.4rem}
.qr-wrap{display:flex;flex-direction:column;align-items:center;gap:.75rem;padding:.5rem 0;text-align:center}
.qr-box{background:#1A1A3E;border-radius:12px;padding:12px;border:2px solid #5B5BD6;display:flex;align-items:center;justify-content:center;width:224px;height:224px}
.qr-url{font-size:11px;color:var(--muted);text-align:center;word-break:break-all;max-width:220px}
.qr-hint{font-size:12px;color:var(--purple);font-weight:700;text-align:center}
.flbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.45rem;display:block;font-family:'Nunito',sans-serif}
.inp{width:100%;padding:15px 16px;border-radius:12px;border:2px solid var(--bd);background:#fff;font-size:17px;color:var(--text);outline:none;display:block;margin-bottom:.85rem;font-family:'DM Sans',sans-serif;font-weight:500;transition:border-color .15s}
.inp:focus{border-color:var(--purple)}
.cr{display:flex;align-items:center;justify-content:center;gap:1.25rem;margin-bottom:.85rem;padding:.25rem 0}
.cbtn{width:52px;height:52px;border-radius:50%;border:2px solid var(--bd);background:var(--bg);font-size:24px;font-weight:700;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--purple);touch-action:manipulation}
.cval-wrap{text-align:center;min-width:56px}
.cval{font-family:'Nunito',sans-serif;font-size:38px;font-weight:900;color:var(--purple);line-height:1}
.clbl{font-size:10px;color:var(--muted);font-family:'Nunito',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-top:2px}
.prow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pnum{font-family:'Nunito',sans-serif;font-weight:900;font-size:13px;color:var(--muted);min-width:20px;text-align:center;flex-shrink:0}
.pinp{flex:1;padding:14px 13px;border-radius:12px;border:2px solid var(--bd);background:#fff;font-size:16px;color:var(--text);outline:none;min-width:0;font-family:'DM Sans',sans-serif;transition:border-color .15s}
.pinp:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(91,91,214,.1)}
.btn{width:100%;padding:17px;border-radius:14px;border:none;font-family:'Nunito',sans-serif;font-size:17px;font-weight:900;display:block;min-height:58px;margin-top:.75rem;touch-action:manipulation;letter-spacing:.01em;cursor:pointer}
.bpc{background:var(--coral);color:#fff}
.alertbox{display:none;background:#FDECEA;color:var(--no);border:1px solid #f5c0bb;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:.75rem}
.successbox{display:none;background:#EAF7F0;color:var(--ok);border:1px solid #b2dfc8;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:.75rem;font-weight:600;text-align:center}
.team-list{display:flex;flex-direction:column;gap:.45rem;max-height:280px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.trow{background:var(--bg);border-radius:10px;padding:.65rem .85rem;display:flex;align-items:center;gap:.6rem;border:1.5px solid var(--bd)}
.trow.playing{border-color:var(--purple);background:var(--purplel)}
.trow.finished{border-color:var(--ok);background:#EAF7F0}
.trow-name{font-family:'Nunito',sans-serif;font-weight:900;font-size:.9rem;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trow-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;font-family:'Nunito',sans-serif;flex-shrink:0}
.b-wait{background:var(--goldl);color:#8A5500}
.b-play{background:var(--purplel);color:var(--purple)}
.b-done{background:#EAF7F0;color:var(--ok)}
.empty-teams{font-size:13px;color:var(--muted);text-align:center;padding:1rem}
.sponsor-footer{background:#FEF3DC;padding:.65rem 1.25rem;display:flex;align-items:center;justify-content:center;gap:.75rem;flex-shrink:0;border-top:1.5px solid #F5D09A}
.sf-label{font-size:10px;font-weight:700;color:#8A5500;text-transform:uppercase;letter-spacing:.1em;font-family:'Nunito',sans-serif;white-space:nowrap}
</style>
</head>

  <div class="cols">
    <div class="card">
      <div class="card-title">&#x1F4F1; Scan with your phone</div>
      <div class="qr-wrap">
        <div class="qr-box">

      <div class="card-title">&#x1F4DD; Register your team</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
var JOIN_URL = 'https://quiz.screenshotinteractive.com/index.html';
var db = null;
var playerCount = 1;

function initQR() {
  var qrEl = document.getElementById('qr-container');
  if (!qrEl || qrEl.childNodes.length > 0) return;
  if (typeof QRCode === 'undefined') { setTimeout(initQR, 100); return; }
  var urlEl = document.getElementById('qr-url');
  if (urlEl) urlEl.textContent = JOIN_URL;
  new QRCode(qrEl, { text: JOIN_URL, width: 200, height: 200, colorDark: '#ffffff', colorLight: '#1A1A3E', correctLevel: QRCode.CorrectLevel.H });
}
document.addEventListener('DOMContentLoaded', initQR);
window.addEventListener('load', initQR);

var pfields = document.getElementById('pfields');
var cvalEl  = document.getElementById('cval');
var clblEl  = document.getElementById('clbl');

function renderPlayerFields() {
  pfields.innerHTML = '';
  for (var i = 1; i <= playerCount; i++) {
    var row = document.createElement('div');
    row.className = 'prow';
    row.innerHTML = '<div class="pnum">' + i + '</div><input class="pinp" type="email" required placeholder="player' + i + '@example.com" autocomplete="off">';
    pfields.appendChild(row);
  }
}

document.getElementById('btn-minus').onclick = function() {
  if (playerCount > 1) { playerCount--; cvalEl.textContent = playerCount; clblEl.textContent = playerCount === 1 ? 'player' : 'players'; renderPlayerFields(); }
};
document.getElementById('btn-plus').onclick = function() {
  if (playerCount < 4) { playerCount++; cvalEl.textContent = playerCount; clblEl.textContent = 'players'; renderPlayerFields(); }
};
renderPlayerFields();

try {
  firebase.initializeApp({apiKey:"AIzaSyBoxCE9DY4VCHiq8beeaGmX5237KiPuFWA",authDomain:"screenshot-trivia-night.firebaseapp.com",databaseURL:"https://screenshot-trivia-night-default-rtdb.firebaseio.com",projectId:"screenshot-trivia-night",storageBucket:"screenshot-trivia-night.firebasestorage.app",messagingSenderId:"482758352954",appId:"1:482758352954:web:832d1cba008bc0b789d503"});
  db = firebase.database();
} catch(e) { console.error('Firebase init', e); }

document.getElementById('btn-reg').onclick = function() {
  var name = document.getElementById('f-tname').value.trim();
  var alertbox = document.getElementById('alertbox');
  var successbox = document.getElementById('successbox');
  alertbox.style.display = 'none';
  successbox.style.display = 'none';
  if (!name) { alertbox.textContent = 'Please enter a team name.'; alertbox.style.display = 'block'; return; }
  if (!db) { alertbox.textContent = 'Connection error. Please try again.'; alertbox.style.display = 'block'; return; }
  var emails = [];
  document.querySelectorAll('.pinp').forEach(function(el) { if (el.value.trim()) emails.push(el.value.trim()); });
  db.ref('teams/' + name.replace(/[.#$\[\]]/g, '_')).set({ name: name, players: playerCount, emails: emails, status: 'waiting', score: 0, joinedAt: Date.now() })
    .then(function() {
      sessionStorage.setItem('trivia_team', JSON.stringify({name: name, players: playerCount, emails: emails}));
      window.location.href = 'index.html';
    })
    .catch(function(e) { alertbox.textContent = 'Error: ' + e.message; alertbox.style.display = 'block'; });
};

if (db) {
  db.ref('teams').on('value', function(snap) {
    var data = snap.val() || {};
    var teams = Object.values(data).sort(function(a,b) { return a.joinedAt - b.joinedAt; });
    var el = document.getElementById('team-list');
    document.getElementById('team-count').textContent = '(' + teams.length + ')';
    if (!teams.length) { el.innerHTML = '<div class="empty-teams">No teams yet — be the first! &#x1F3C6;</div>'; return; }
    el.innerHTML = teams.map(function(t) {
      var badge = t.status==='playing' ? '<span class="trow-badge b-play">Playing</span>' : t.status==='finished' ? '<span class="trow-badge b-done">Done</span>' : '<span class="trow-badge b-wait">Waiting</span>';
      var cls = t.status==='playing' ? ' playing' : t.status==='finished' ? ' finished' : '';
      return '<div class="trow'+cls+'"><div class="trow-name">&#x1F3AE; '+t.name+'</div>'+badge+'</div>';
    }).join('');
  });
}
</script>
