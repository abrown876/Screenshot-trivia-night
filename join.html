<title>Join — Screenshot Quiz Night</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0B0B1A;--surface:#141428;--surface2:#1C1C36;
  --purple:#7C6EF6;--purple-dim:#5B50C8;--purple-glow:rgba(124,110,246,.25);
  --coral:#FF5C8A;--gold:#FFB740;
  --text:#EEEEFF;--text-dim:#8888BB;--border:rgba(124,110,246,.15);
  --green:#3DDC84;
  --font-display:'Outfit',sans-serif;--font-mono:'Space Mono',monospace;
}
html,body{min-height:100%;background:var(--bg);font-family:var(--font-display);color:var(--text);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,110,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(124,110,246,.03) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;z-index:0}

/* HERO */
.hero{background:var(--surface);padding:1.75rem 1.5rem 1.5rem;text-align:center;position:relative;overflow:hidden;border-bottom:1px solid var(--border);flex-shrink:0}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 0%,rgba(124,110,246,.12) 0%,transparent 50%),radial-gradient(ellipse at 70% 0%,rgba(255,92,138,.08) 0%,transparent 50%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--purple),var(--coral),transparent)}
.hero-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:.65rem}
.hero-logo{height:40px;width:auto;display:block;opacity:.92}
.hero-divider{display:flex;align-items:center;gap:.75rem;width:100%;max-width:320px}
.hero-divider::before,.hero-divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border))}
.hero-divider::after{background:linear-gradient(90deg,var(--border),transparent)}
.hero-divider span{font-size:9px;color:var(--text-dim);letter-spacing:.2em;text-transform:uppercase;font-weight:600;white-space:nowrap}
.hero-title{font-weight:900;font-size:1.6rem;color:#fff;letter-spacing:.06em;line-height:1.1}
.hero-title{background:linear-gradient(135deg,var(--purple),var(--coral));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-tagline{font-size:11.5px;color:var(--text-dim);letter-spacing:.04em}
.hero-tagline span{display:inline-block;width:3px;height:3px;border-radius:50%;background:var(--purple);vertical-align:middle;margin:0 .6em;opacity:.5}

/* SPONSOR */
.sponsor-bar{background:linear-gradient(90deg,#E85D24 0%,#D14520 100%);padding:10px 20px;display:flex;align-items:center;justify-content:center;gap:12px;flex-shrink:0}
.sponsor-label{font-size:10px;font-weight:600;color:rgba(255,255,255,.75);letter-spacing:.1em;text-transform:uppercase}

/* MAIN LAYOUT */
.wrap{flex:1;display:flex;flex-direction:column;padding:1.25rem;gap:1rem;max-width:900px;margin:0 auto;width:100%;position:relative;z-index:1}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;align-items:start}
@media(max-width:600px){.cols{grid-template-columns:1fr}}

/* CARDS */
.card{background:var(--surface);border-radius:16px;padding:1.25rem;border:1px solid var(--border)}
.card-title{font-weight:800;font-size:1rem;color:var(--text);margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}

/* QR SECTION */
.qr-wrap{display:flex;flex-direction:column;align-items:center;gap:1rem;padding:.5rem 0}
.qr-box{background:var(--bg);border-radius:16px;padding:16px;border:2px solid var(--purple);display:flex;align-items:center;justify-content:center;width:232px;height:232px;box-shadow:0 0 30px var(--purple-glow)}
.qr-hint{font-size:13px;color:var(--purple);font-weight:700;text-align:center}
.join-btn{background:linear-gradient(135deg,var(--coral) 0%,#FF3D6E 100%);color:#fff;text-decoration:none;border-radius:50px;padding:.85rem 1.75rem;font-size:1rem;font-weight:800;display:inline-flex;align-items:center;gap:.5rem;box-shadow:0 4px 20px rgba(255,92,138,.35);margin-top:.5rem;transition:transform .15s,box-shadow .15s}
.join-btn:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(255,92,138,.45)}
@keyframes soft-pulse{0%,100%{box-shadow:0 4px 20px rgba(255,92,138,.3)}50%{box-shadow:0 4px 28px rgba(255,92,138,.5)}}
.join-btn{animation:soft-pulse 3s ease-in-out infinite}

/* TEAMS LIST */
.team-list{display:flex;flex-direction:column;gap:.5rem;max-height:300px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.trow{background:var(--surface2);border-radius:10px;padding:.7rem 1rem;display:flex;align-items:center;gap:.6rem;border:1.5px solid var(--border)}
.trow.playing{border-color:var(--purple);background:rgba(124,110,246,.1)}
.trow.finished{border-color:var(--green);background:rgba(61,220,132,.1)}
.trow-name{font-weight:800;font-size:.9rem;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trow-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;flex-shrink:0}
.b-wait{background:rgba(255,183,64,.15);color:var(--gold)}
.b-play{background:rgba(124,110,246,.15);color:var(--purple)}
.b-done{background:rgba(61,220,132,.15);color:var(--green)}
.empty-teams{font-size:13px;color:var(--text-dim);text-align:center;padding:1.5rem}
</style>
</head>

<script>
var JOIN_URL = 'https://quiz.screenshotinteractive.com/index.html';
var db = null;

function initQR() {
  var el = document.getElementById('qr-container');
  if (!el || el.childNodes.length > 0) return;
  if (typeof QRCode === 'undefined') { setTimeout(initQR, 100); return; }
  new QRCode(el, { text: JOIN_URL, width: 200, height: 200, colorDark: '#ffffff', colorLight: '#0B0B1A', correctLevel: QRCode.CorrectLevel.H });
}
document.addEventListener('DOMContentLoaded', initQR);
window.addEventListener('load', initQR);

try {
  firebase.initializeApp({apiKey:"AIzaSyBoxCE9DY4VCHiq8beeaGmX5237KiPuFWA",authDomain:"screenshot-trivia-night.firebaseapp.com",databaseURL:"https://screenshot-trivia-night-default-rtdb.firebaseio.com",projectId:"screenshot-trivia-night",storageBucket:"screenshot-trivia-night.firebasestorage.app",messagingSenderId:"482758352954",appId:"1:482758352954:web:832d1cba008bc0b789d503"});
  db = firebase.database();
} catch(e) { console.error(e); }

if (db) {
  db.ref('teams').on('value', function(snap) {
    var data = snap.val() || {};
    var teams = Object.values(data).sort(function(a,b) { return a.joinedAt - b.joinedAt; });
    document.getElementById('team-count').textContent = '(' + teams.length + ')';
    var el = document.getElementById('team-list');
    if (!teams.length) { el.innerHTML = '<div class="empty-teams">No teams yet — be the first!</div>'; return; }
    el.innerHTML = teams.map(function(t) {
      var badge = t.status === 'playing' ? '<span class="trow-badge b-play">Playing</span>' : t.status === 'finished' ? '<span class="trow-badge b-done">Done</span>' : '<span class="trow-badge b-wait">Waiting</span>';
      var cls = t.status === 'playing' ? ' playing' : t.status === 'finished' ? ' finished' : '';
      return '<div class="trow' + cls + '"><div class="trow-name">' + t.name + '</div>' + badge + '</div>';
    }).join('');
  });
}
</script>
