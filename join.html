<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Join — Screenshot Quiz Night</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0B0B1A;--surface:#141428;--surface2:#1C1C36;
  --purple:#7C6EF6;--purple-dim:#5B50C8;--purple-glow:rgba(124,110,246,.25);
  --coral:#FF5C8A;--gold:#FFB740;
  --text:#EEEEFF;--text-dim:#8888BB;--border:rgba(124,110,246,.15);
  --font-display:'Outfit',sans-serif;--font-mono:'Space Mono',monospace;
}
html,body{height:100%;background:var(--bg);font-family:var(--font-display);color:var(--text);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;overflow:hidden}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,110,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(124,110,246,.03) 1px,transparent 1px);background-size:28px 28px;pointer-events:none}
.hero{background:linear-gradient(145deg,rgba(124,110,246,.15),rgba(255,92,138,.08));padding:1.25rem;text-align:center;position:relative;overflow:hidden;border-bottom:1px solid var(--border)}
.hero-title{font-weight:900;font-size:1.3rem;color:#fff;margin-bottom:.2rem}
.hero-sub{font-size:11px;color:var(--text-dim);letter-spacing:.15em;text-transform:uppercase;font-weight:700}
.wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:space-evenly;padding:1.25rem;gap:.5rem;overflow-y:auto}
.cta-btn{background:var(--coral);color:#fff;border:none;border-radius:18px;padding:1rem 2rem;font-family:var(--font-display);font-size:1.1rem;font-weight:900;cursor:pointer;touch-action:manipulation;width:100%;max-width:340px;display:flex;align-items:center;justify-content:center;gap:.5rem;box-shadow:0 4px 20px rgba(255,92,138,.3)}
.cta-btn:active{transform:scale(.97)}
.qr-section{display:flex;flex-direction:column;align-items:center;gap:.5rem}
.qr-box{background:var(--surface);border-radius:16px;padding:12px;border:2px solid var(--purple);display:flex;align-items:center;justify-content:center;width:180px;height:180px;box-shadow:0 0 30px var(--purple-glow)}
.qr-label{font-size:12px;color:var(--text-dim)}
.qr-url{font-size:10px;color:var(--text-dim);text-align:center;word-break:break-all;max-width:220px;font-family:var(--font-mono)}
.divider{display:flex;align-items:center;gap:.75rem;width:100%;max-width:340px}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-text{font-size:11px;color:var(--text-dim);font-weight:600}
.team-strip{width:100%;max-width:420px}
.team-strip-title{font-weight:900;font-size:.85rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem;text-align:center}
.team-list{display:flex;flex-wrap:wrap;gap:.35rem;justify-content:center;max-height:100px;overflow:hidden}
.tpill{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:.25rem .7rem;font-weight:800;font-size:.75rem;white-space:nowrap}
.tpill.playing{border-color:var(--purple);background:rgba(124,110,246,.12);color:var(--purple)}
.tpill.finished{border-color:rgba(61,220,132,.3);background:rgba(61,220,132,.12);color:#3DDC84}
.empty-teams{font-size:12px;color:var(--text-dim);text-align:center}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-sub" style="margin-bottom:.4rem">Screenshot Interactive</div>
  <div class="hero-title">Quiz Night 🎮</div>
  <div class="hero-sub">Scan to Join</div>
</div>
<div class="wrap">
  <div class="qr-section">
    <div class="qr-box" id="qr-container"></div>
    <div class="qr-label">Point your camera at the code</div>
    <div class="qr-url" id="qr-url"></div>
  </div>
  <div class="divider"><div class="divider-line"></div><div class="divider-text">or open the link directly</div><div class="divider-line"></div></div>
  <div class="team-strip">
    <div class="team-strip-title">👥 Teams registered: <span id="team-count">0</span></div>
    <div class="team-list" id="team-list"><div class="empty-teams">No teams yet — be the first!</div></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
var JOIN_URL='https://quiz.screenshotinteractive.com/index.html';
var db=null;
function initQR(){
  var el=document.getElementById('qr-container');
  if(!el||el.childNodes.length>0)return;
  if(typeof QRCode==='undefined'){setTimeout(initQR,100);return;}
  document.getElementById('qr-url').textContent=JOIN_URL;
  new QRCode(el,{text:JOIN_URL,width:156,height:156,colorDark:'#ffffff',colorLight:'#0B0B1A',correctLevel:QRCode.CorrectLevel.H});
}
document.addEventListener('DOMContentLoaded',initQR);
window.addEventListener('load',initQR);
try{
  firebase.initializeApp({apiKey:"AIzaSyBoxCE9DY4VCHiq8beeaGmX5237KiPuFWA",authDomain:"screenshot-trivia-night.firebaseapp.com",databaseURL:"https://screenshot-trivia-night-default-rtdb.firebaseio.com",projectId:"screenshot-trivia-night",storageBucket:"screenshot-trivia-night.firebasestorage.app",messagingSenderId:"482758352954",appId:"1:482758352954:web:832d1cba008bc0b789d503"});
  db=firebase.database();
}catch(e){console.error(e);}
if(db){
  db.ref('teams').on('value',function(snap){
    var data=snap.val()||{};
    var teams=Object.values(data).sort(function(a,b){return a.joinedAt-b.joinedAt;});
    document.getElementById('team-count').textContent=teams.length;
    var el=document.getElementById('team-list');
    if(!teams.length){el.innerHTML='<div class="empty-teams">No teams yet — be the first!</div>';return;}
    el.innerHTML=teams.map(function(t){var cls=t.status==='playing'?' playing':t.status==='finished'?' finished':'';return '<div class="tpill'+cls+'">🎮 '+t.name+'</div>';}).join('');
  });
}
</script>
</body>
</html>
