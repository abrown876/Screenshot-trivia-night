<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#080818">
<title>Host Control — Screenshot Quiz Night</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080818;
  --surface:#10102A;--surface2:#181832;--surface3:#20203C;
  --purple:#7C6EF6;--purple-dim:#5B50C8;--purple-glow:rgba(124,110,246,.3);--purple-glow2:rgba(124,110,246,.12);
  --coral:#FF5C8A;--coral-glow:rgba(255,92,138,.25);
  --gold:#FFB740;
  --green:#3DDC84;--green-bg:rgba(61,220,132,.12);
  --red:#FF4B5C;--red-bg:rgba(255,75,92,.12);
  --text:#F0F0FF;--text-dim:#8888BB;--text-muted:#4A4A7A;
  --border:rgba(124,110,246,.18);--border2:rgba(124,110,246,.08);
  --r:16px;
  --font-display:'Outfit',sans-serif;
  --font-mono:'Space Mono',monospace;
}
html,body{height:100%;background:var(--bg);font-family:var(--font-display);color:var(--text);overflow-x:hidden}
body{display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 20% 0%,rgba(124,110,246,.12) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 0%,rgba(255,92,138,.08) 0%,transparent 50%);
  pointer-events:none;z-index:0}

/* HEADER */
.hdr{background:rgba(8,8,24,.95);padding:.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;z-index:100;position:relative}
.hdr-title{font-weight:800;font-size:1.1rem;color:var(--text)}
.hdr-badge{background:linear-gradient(135deg,var(--coral),#E8446F);color:#fff;font-size:11px;font-weight:800;padding:5px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em}

/* MAIN */
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1.25rem;position:relative;z-index:1}
.container{max-width:800px;margin:0 auto}

/* CARDS */
.card{background:var(--surface);border-radius:var(--r);padding:1.25rem;border:1px solid var(--border);margin-bottom:1rem}
.card-title{font-size:12px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.75rem}

/* STATUS */
.status-row{display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.status-item{display:flex;align-items:center;gap:.5rem}
.status-dot{width:10px;height:10px;border-radius:50%;background:var(--text-muted)}
.status-dot.live{background:var(--green);box-shadow:0 0 8px var(--green)}
.status-dot.waiting{background:var(--gold);animation:pulse 1.5s infinite}
.status-dot.off{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-label{font-size:14px;font-weight:600;color:var(--text-dim)}
.status-value{font-size:14px;font-weight:700;color:var(--text)}

/* QUESTION DISPLAY */
.q-display{background:var(--surface2);border-radius:12px;padding:1rem;margin-bottom:1rem}
.q-number{font-size:11px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.35rem}
.q-text{font-size:1.1rem;font-weight:700;line-height:1.5;color:var(--text);margin-bottom:.75rem}
.q-options{display:flex;flex-direction:column;gap:.4rem}
.q-opt{font-size:14px;color:var(--text-dim);padding:.4rem .6rem;border-radius:8px;background:var(--surface3);display:flex;align-items:center;gap:.5rem}
.q-opt.correct{background:var(--green-bg);color:var(--green);border:1px solid rgba(61,220,132,.3)}
.q-opt-letter{font-weight:800;font-size:12px;color:var(--purple);font-family:var(--font-mono)}

/* BUTTONS */
.btn{width:100%;padding:16px;border-radius:var(--r);font-size:16px;font-weight:800;border:none;cursor:pointer;font-family:var(--font-display);transition:transform .1s,opacity .1s;touch-action:manipulation;letter-spacing:.02em}
.btn:active:not(:disabled){transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn+.btn{margin-top:.5rem}
.btn-coral{background:linear-gradient(135deg,#FF5C8A,#E8446F);color:#fff;box-shadow:0 4px 24px var(--coral-glow)}
.btn-purple{background:linear-gradient(135deg,var(--purple),var(--purple-dim));color:#fff;box-shadow:0 4px 24px var(--purple-glow)}
.btn-green{background:linear-gradient(135deg,var(--green),#2AB870);color:#000;box-shadow:0 4px 24px rgba(61,220,132,.3)}
.btn-ghost{background:transparent;border:2px solid var(--border);color:var(--text-dim)}
.btn-red{background:linear-gradient(135deg,var(--red),#CC3344);color:#fff;box-shadow:0 4px 24px rgba(255,75,92,.25)}
.btn-gold{background:linear-gradient(135deg,#FFB740,#E59A20);color:#000;box-shadow:0 4px 24px rgba(255,183,64,.3)}
.btn-sm{padding:12px 20px;font-size:14px;width:auto}

/* CONTROLS */
.controls{display:flex;gap:.75rem;flex-wrap:wrap}
.controls .btn{flex:1;min-width:140px}

/* QUESTION LIST */
.q-list{display:flex;flex-direction:column;gap:.5rem}
.q-item{background:var(--surface2);border-radius:12px;padding:.85rem 1rem;display:flex;align-items:center;gap:.75rem;cursor:pointer;border:2px solid transparent;transition:all .15s}
.q-item:hover{border-color:var(--border);background:var(--surface3)}
.q-item.active{border-color:var(--purple);background:rgba(124,110,246,.1)}
.q-item.sent{border-color:var(--green);background:var(--green-bg)}
.q-item-num{width:28px;height:28px;border-radius:50%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:var(--purple);font-family:var(--font-mono);flex-shrink:0}
.q-item.sent .q-item-num{background:var(--green);color:#000}
.q-item-text{flex:1;font-size:14px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.q-item-status{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted)}
.q-item.sent .q-item-status{color:var(--green)}

/* PLAYERS LIST */
.players-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.5rem}
.player-chip{background:var(--surface2);border-radius:10px;padding:.6rem .8rem;display:flex;align-items:center;gap:.5rem;border:1px solid var(--border)}
.player-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--coral));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#fff;flex-shrink:0}
.player-info{flex:1;min-width:0}
.player-name{font-size:13px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-score{font-size:11px;color:var(--text-dim);font-family:var(--font-mono)}

/* TIMER DISPLAY */
.timer-display{text-align:center;padding:1.5rem}
.timer-big{font-family:var(--font-mono);font-size:5rem;font-weight:900;color:var(--purple);line-height:1}
.timer-big.warn{color:var(--gold)}
.timer-big.danger{color:var(--red);animation:timerPulse .4s infinite}
@keyframes timerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.timer-label{font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em;margin-top:.5rem}

/* TOAST */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border);padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;color:var(--text);opacity:0;transition:all .3s;z-index:1000;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* FOOTER */
.site-footer{background:rgba(8,8,24,.95);border-top:1px solid var(--border);padding:.75rem 1rem;text-align:center;flex-shrink:0;z-index:100}

/* Mobile optimizations */
@media(max-width:430px){
  .main{padding:1rem}
  .card{padding:1rem}
  .hdr{padding:.6rem 1rem}
  .hdr-title{font-size:1rem}
  .q-text{font-size:1rem}
  .q-item{padding:.75rem}
  .q-item-text{font-size:13px}
  .timer-big{font-size:4rem}
  .controls{flex-direction:column}
  .controls .btn{min-width:100%}
  .status-row{gap:.5rem}
  .status-item{font-size:12px}
  .players-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
}

@media(max-width:360px){
  .q-item-text{font-size:12px}
  .timer-big{font-size:3.5rem}
  .btn{padding:14px;font-size:14px}
  .card-title{font-size:11px}
}

/* Safe area for notched phones */
@supports(padding: max(0px)) {
  .hdr{padding-top:max(.6rem, env(safe-area-inset-top));padding-left:max(1rem, env(safe-area-inset-left));padding-right:max(1rem, env(safe-area-inset-right))}
  .site-footer{padding-bottom:max(.75rem, env(safe-area-inset-bottom))}
}

/* Touch-friendly */
@media (pointer: coarse) {
  .q-item{min-height:56px}
  .btn{min-height:52px}
}
</style>
</head>
<body>

<header class="hdr">
  <span class="hdr-title">Andrew's Birthday Quiz</span>
  <span class="hdr-badge" id="status-badge">Offline</span>
</header>

<div class="main">
  <div class="container">
    
    <!-- STATUS CARD -->
    <div class="card">
      <div class="card-title">Game Status</div>
      <div class="status-row">
        <div class="status-item">
          <div class="status-dot" id="status-dot"></div>
          <span class="status-label">Status:</span>
          <span class="status-value" id="game-status">Not Started</span>
        </div>
        <div class="status-item">
          <span class="status-label">Players:</span>
          <span class="status-value" id="player-count">0</span>
        </div>
        <div class="status-item">
          <span class="status-label">Question:</span>
          <span class="status-value" id="current-q">—</span>
        </div>
      </div>
    </div>

    <!-- CURRENT QUESTION -->
    <div class="card" id="current-question-card" style="display:none">
      <div class="card-title">Current Question</div>
      <div class="q-display">
        <div class="q-number" id="q-display-num">Question 1 of 10</div>
        <div class="q-text" id="q-display-text">—</div>
        <div class="q-options" id="q-display-opts"></div>
      </div>
      <div class="timer-display" id="timer-display" style="display:none">
        <div class="timer-big" id="timer-big">10</div>
        <div class="timer-label">Seconds Remaining</div>
      </div>
      <div class="controls">
        <button class="btn btn-green" id="btn-reveal" onclick="revealAnswer()">✨ Reveal Answer</button>
        <button class="btn btn-purple" id="btn-next" onclick="nextQuestion()">Next Question →</button>
      </div>
      <div class="controls" style="margin-top:.5rem">
        <button class="btn btn-gold" id="btn-leaderboard" onclick="showLeaderboard()">🏆 Show Leaderboard</button>
      </div>
    </div>

    <!-- GAME CONTROLS -->
    <div class="card">
      <div class="card-title">Game Controls</div>
      <div class="controls">
        <button class="btn btn-coral" id="btn-start" onclick="startGame()">🎉 Start Party!</button>
        <button class="btn btn-ghost" id="btn-reset" onclick="resetGame()">🔄 Reset Game</button>
      </div>
      <div class="controls" style="margin-top:.75rem">
        <button class="btn btn-red" id="btn-reset-players" onclick="resetPlayers()">👥 Clear All Players</button>
        <button class="btn btn-ghost" id="btn-end" onclick="endGame()">🏁 End Game</button>
      </div>
    </div>

    <!-- QUESTION QUEUE -->
    <div class="card">
      <div class="card-title">Questions — Tap to Push</div>
      <div class="q-list" id="q-list"></div>
    </div>

    <!-- CONNECTED PLAYERS -->
    <div class="card">
      <div class="card-title">Players <span id="player-count-badge" style="background:var(--purple);color:#fff;padding:2px 8px;border-radius:10px;font-size:10px;margin-left:6px">0</span></div>
      <div class="players-grid" id="players-grid">
        <div style="color:var(--text-muted);font-size:13px;grid-column:1/-1">Waiting for players to join...</div>
      </div>
    </div>

  </div>
</div>

<div class="site-footer">
  <span style="font-size:11px;color:var(--text-muted);font-weight:600;letter-spacing:.06em;text-transform:uppercase">Powered by <span style="color:var(--purple)">Screenshot Interactive</span></span>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
// Firebase init
let db = null;
try {
  firebase.initializeApp({
    apiKey:"AIzaSyBoxCE9DY4VCHiq8beeaGmX5237KiPuFWA",
    authDomain:"screenshot-trivia-night.firebaseapp.com",
    databaseURL:"https://screenshot-trivia-night-default-rtdb.firebaseio.com",
    projectId:"screenshot-trivia-night"
  });
  db = firebase.database();
} catch(e) { console.warn('Firebase unavailable:', e.message); }

// Questions — same as player file
const QUESTIONS = [
  {cat:"f",lb:"Favorites", q:"What is Andrew's #1 favourite candy?",                                    o:["Twizzlers","Pull n Peel Twizzlers","Gummy Bears","M&Ms"],a:0},
  {cat:"m",lb:"Movies",    q:"What is Andrew's all-time favourite movie?",                              o:["The Dark Knight","The Truman Show","Zoolander","Austin Powers: International Man of Mystery"],a:3},
  {cat:"f",lb:"Food",      q:"What is Andrew's go-to fast food order?",                                 o:["KFC Wings","Hawaiian Pizza","Grilled Chicken Whole Bowl","Oxtail with Rice and Peas"],a:0},
  {cat:"x",lb:"Lifestyle", q:"What is Andrew's ideal vacation destination?",                            o:["Miami","Tulum","Italy","Germany"],a:2},
  {cat:"x",lb:"Lifestyle", q:"What is Andrew's biggest pet peeve?",                                     o:["Being late","Poor communication","Double dippers","People who chew with their mouth open"],a:2},
  {cat:"x",lb:"Lifestyle", q:"What time does Andrew ACTUALLY wake up?",                                 o:["4:00 AM","5:30 AM","6:00 AM","Depends on the night before"],a:1},
  {cat:"x",lb:"Values",    q:"What would Andrew choose first?",                                         o:["Money","Freedom","Stability","Power"],a:1},
  {cat:"x",lb:"Values",    q:"What does Andrew value most in people?",                                  o:["Loyalty","Consistency","Ambition","Going 50/50"],a:0},
  {cat:"x",lb:"Lifestyle", q:"What would Andrew NEVER do?",                                             o:["Go skydiving","Move away from Jamaica","Turn right at the Upper Waterloo entrance to Fontana","Go to Eleni's"],a:2},
  {cat:"x",lb:"Values",    q:"What would Andrew do if he won $100M tomorrow?",                          o:["Retire immediately","Build 3 new businesses","Tell no one","Buy property"],a:2},
];

const LTRS = ['A','B','C','D'];
const TIMER_DURATION = 10;

let gameState = {
  status: 'idle', // idle, live, paused, ended
  currentQ: -1,
  timer: TIMER_DURATION,
  revealed: false,
  sentQuestions: []
};

let timerInterval = null;
let players = {};

const $ = id => document.getElementById(id);

// Toast notification
function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Render question list
function renderQuestionList() {
  const list = $('q-list');
  list.innerHTML = QUESTIONS.map((q, i) => {
    const isSent = gameState.sentQuestions.includes(i);
    const isActive = gameState.currentQ === i;
    const statusText = isSent ? '✓ Sent' : (isActive ? 'Active' : '');
    return `
      <div class="q-item ${isActive ? 'active' : ''} ${isSent ? 'sent' : ''}" onclick="selectQuestion(${i})">
        <div class="q-item-num">${i + 1}</div>
        <div class="q-item-text">${q.q}</div>
        <div class="q-item-status">${statusText}</div>
      </div>
    `;
  }).join('');
}

// Select and push a question
function selectQuestion(idx) {
  if (gameState.status !== 'live') {
    toast('Start the game first!');
    return;
  }
  
  gameState.currentQ = idx;
  gameState.revealed = false;
  gameState.timer = TIMER_DURATION;
  
  pushQuestionToPlayers(idx);
  renderCurrentQuestion();
  renderQuestionList();
  startTimer();
  
  toast(`Question ${idx + 1} pushed to players!`);
}

// Render current question display
function renderCurrentQuestion() {
  const card = $('current-question-card');
  
  if (gameState.currentQ < 0) {
    card.style.display = 'none';
    $('current-q').textContent = '—';
    return;
  }
  
  card.style.display = 'block';
  const q = QUESTIONS[gameState.currentQ];
  
  $('q-display-num').textContent = `Question ${gameState.currentQ + 1} of ${QUESTIONS.length}`;
  $('q-display-text').textContent = q.q;
  $('current-q').textContent = `${gameState.currentQ + 1} / ${QUESTIONS.length}`;
  
  $('q-display-opts').innerHTML = q.o.map((opt, i) => {
    const isCorrect = i === q.a && gameState.revealed;
    return `<div class="q-opt ${isCorrect ? 'correct' : ''}">
      <span class="q-opt-letter">${LTRS[i]}</span>
      ${opt}
      ${isCorrect ? ' ✓' : ''}
    </div>`;
  }).join('');
  
  $('btn-reveal').style.display = gameState.revealed ? 'none' : 'block';
  $('btn-next').style.display = gameState.revealed ? 'block' : 'none';
}

// Push question to Firebase for players
function pushQuestionToPlayers(idx) {
  if (!db) return;
  
  const q = QUESTIONS[idx];
  
  db.ref('game').set({
    status: 'question',
    questionIndex: idx,
    question: q.q,
    options: q.o,
    category: q.lb,
    timer: TIMER_DURATION,
    revealed: false,
    correctAnswer: -1, // Don't reveal yet
    timestamp: Date.now()
  });
  
  if (!gameState.sentQuestions.includes(idx)) {
    gameState.sentQuestions.push(idx);
  }
}

// Start countdown timer
function startTimer() {
  clearInterval(timerInterval);
  gameState.timer = TIMER_DURATION;
  
  $('timer-display').style.display = 'block';
  updateTimerDisplay();
  
  timerInterval = setInterval(() => {
    gameState.timer--;
    updateTimerDisplay();
    
    // Sync timer to Firebase
    if (db) {
      db.ref('game/timer').set(gameState.timer);
    }
    
    if (gameState.timer <= 0) {
      clearInterval(timerInterval);
      // Timer expired - DO NOT auto-reveal. Host must click Reveal button.
      toast('Time\'s up! Click Reveal Answer when ready.');
    }
  }, 1000);
}

// Update timer display
function updateTimerDisplay() {
  const el = $('timer-big');
  el.textContent = gameState.timer;
  el.className = 'timer-big';
  if (gameState.timer <= 3) el.classList.add('danger');
  else if (gameState.timer <= 5) el.classList.add('warn');
}

// Reveal answer
function revealAnswer() {
  clearInterval(timerInterval);
  gameState.revealed = true;
  
  $('timer-display').style.display = 'none';
  
  if (db && gameState.currentQ >= 0) {
    const q = QUESTIONS[gameState.currentQ];
    db.ref('game').update({
      revealed: true,
      correctAnswer: q.a,
      status: 'revealed'
    });
  }
  
  renderCurrentQuestion();
  toast('Answer revealed!');
}

// Next question
function nextQuestion() {
  const nextIdx = gameState.currentQ + 1;
  
  if (nextIdx >= QUESTIONS.length) {
    toast('All 10 questions complete! Click "End Game" when ready.');
    return;
  }
  
  selectQuestion(nextIdx);
}

// Start game
function startGame() {
  gameState.status = 'live';
  gameState.currentQ = -1;
  gameState.sentQuestions = [];
  gameState.revealed = false;
  
  updateStatusDisplay();
  renderQuestionList();
  renderCurrentQuestion();
  
  if (db) {
    db.ref('game').set({
      status: 'waiting',
      questionIndex: -1,
      timestamp: Date.now()
    });
  }
  
  toast('Game started! Click a question to push it.');
}

// Reset game
function resetGame() {
  clearInterval(timerInterval);
  
  gameState = {
    status: 'idle',
    currentQ: -1,
    timer: TIMER_DURATION,
    revealed: false,
    sentQuestions: []
  };
  
  if (db) {
    db.ref('game').set({
      status: 'idle',
      timestamp: Date.now()
    });
  }
  
  updateStatusDisplay();
  renderQuestionList();
  renderCurrentQuestion();
  
  toast('Game reset!');
}

// End game
function endGame() {
  clearInterval(timerInterval);
  gameState.status = 'ended';
  
  if (db) {
    db.ref('game').update({
      status: 'ended',
      timestamp: Date.now()
    });
  }
  
  updateStatusDisplay();
  toast('Game ended! 🎉');
}

// Update status display
function updateStatusDisplay() {
  const dot = $('status-dot');
  const badge = $('status-badge');
  const status = $('game-status');
  
  dot.className = 'status-dot';
  
  switch (gameState.status) {
    case 'live':
      dot.classList.add('live');
      badge.textContent = 'Live';
      badge.style.background = 'linear-gradient(135deg, var(--green), #2AB870)';
      status.textContent = 'In Progress';
      break;
    case 'ended':
      dot.classList.add('off');
      badge.textContent = 'Ended';
      badge.style.background = 'linear-gradient(135deg, var(--text-muted), #666)';
      status.textContent = 'Game Over';
      break;
    default:
      dot.classList.add('waiting');
      badge.textContent = 'Standby';
      badge.style.background = 'linear-gradient(135deg, var(--gold), #E6A020)';
      status.textContent = 'Not Started';
  }
}

// Render players
function renderPlayers() {
  const grid = $('players-grid');
  const entries = Object.entries(players);
  
  $('player-count').textContent = entries.length;
  $('player-count-badge').textContent = entries.length;
  
  if (entries.length === 0) {
    grid.innerHTML = '<div style="color:var(--text-muted);font-size:13px;grid-column:1/-1">Waiting for players to join...</div>';
    return;
  }
  
  grid.innerHTML = entries.map(([key, p]) => {
    const initials = (p.name || '?').slice(0, 2).toUpperCase();
    return `
      <div class="player-chip">
        <div class="player-avatar">${initials}</div>
        <div class="player-info">
          <div class="player-name">${p.name || 'Unknown'}</div>
          <div class="player-score">${p.score || 0} pts</div>
        </div>
      </div>
    `;
  }).join('');
}

// Reset/clear all players
function resetPlayers() {
  if (!confirm('Clear all players? They will need to rejoin.')) return;
  
  if (db) {
    db.ref('teams').remove();
    db.ref('scores').remove();
  }
  
  players = {};
  renderPlayers();
  toast('All players cleared!');
}

// Show leaderboard to all players
function showLeaderboard() {
  if (!db) return;
  
  db.ref('game').update({
    status: 'leaderboard',
    timestamp: Date.now()
  });
  
  toast('Showing leaderboard to players!');
}

// Listen for players
function listenForPlayers() {
  if (!db) return;
  
  db.ref('teams').on('value', snap => {
    players = snap.val() || {};
    renderPlayers();
  });
  
  // Also listen for scores
  db.ref('scores').on('value', snap => {
    const scores = snap.val() || {};
    // Merge scores into players
    Object.entries(scores).forEach(([key, data]) => {
      if (players[key]) {
        players[key].score = data.score;
      }
    });
    renderPlayers();
  });
}

// Initialize
function init() {
  updateStatusDisplay();
  renderQuestionList();
  renderCurrentQuestion();
  listenForPlayers();
  
  if (db) {
    $('status-dot').classList.add('live');
    toast('Connected to Firebase');
  } else {
    toast('⚠️ Firebase not connected');
  }
}

init();
</script>
</body>
</html>
