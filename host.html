<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Host Panel — Screenshot Quiz Night</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#5B5BD6;--purplel:#EEEEFF;--purpled:#3D3D9E;
  --coral:#E8547A;--corall:#FDE8EE;
  --green:#1A8A4A;--greenl:#EAF7F0;
  --amber:#E8930A;--amberl:#FEF3DC;
  --gold:#F5A623;--goldl:#FEF3DC;
  --bg:#F4F4FC;--card:#fff;--text:#1A1A3E;--muted:#7A7AAA;--bd:#E0E0F0;
  --r:16px;--sh:0 4px 20px rgba(91,91,214,.10)
}
html,body{min-height:100vh;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);display:flex;flex-direction:column}
.hdr{background:var(--purpled);padding:.85rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 16px rgba(0,0,0,.2)}
.hdr-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;color:#fff}
.host-badge{background:var(--coral);color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;padding:4px 14px;border-radius:20px}
.main{max-width:720px;margin:0 auto;padding:1.5rem;display:flex;flex-direction:column;gap:1.1rem;flex:1;width:100%}
.card{background:var(--card);border-radius:var(--r);padding:1.25rem 1.5rem;box-shadow:var(--sh)}
.slabel{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.7rem;font-family:'Nunito',sans-serif}
.status-bar{display:flex;align-items:center;justify-content:space-between;border-left:5px solid var(--purple);flex-wrap:wrap;gap:.75rem}
.status-val{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.1rem;color:var(--text)}
.count-pills{display:flex;gap:.5rem;flex-wrap:wrap}
.pill{font-family:'Nunito',sans-serif;font-weight:800;font-size:.85rem;padding:.3rem .85rem;border-radius:20px}
.pill-wait{background:#FEF3DC;color:#8A5500}
.pill-play{background:#EEF0FF;color:#3D3D9E}
.pill-done{background:#EAF7F0;color:#1A6A3A}
.round-tabs{display:flex;gap:.5rem;margin-bottom:1rem}
.rtab{flex:1;padding:.6rem;border-radius:10px;border:2px solid var(--bd);background:var(--bg);font-family:'Nunito',sans-serif;font-weight:800;font-size:.85rem;cursor:pointer;text-align:center;color:var(--muted);touch-action:manipulation}
.rtab.active{border-color:var(--purple);background:var(--purplel);color:var(--purple)}
.rtab.done{border-color:var(--green);background:var(--greenl);color:var(--green)}
.q-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem}
.q-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:.95rem;color:var(--text)}
.cpill{font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;font-family:'Nunito',sans-serif}
.ch{background:#FEF3DC;color:#8A5500}.cf{background:#FAECE7;color:#8A2E0F}
.cm{background:#EEF0FF;color:#3D3D9E}.cs{background:#FDE8EE;color:#8A1840}.cx{background:#F0F0F8;color:#4A4A8A}
.q-text{font-family:'Nunito',sans-serif;font-weight:800;font-size:1.05rem;line-height:1.4;color:var(--text);margin-bottom:.85rem}
.answer-box{background:var(--greenl);border:1.5px solid #90D4A8;border-radius:10px;padding:.7rem 1rem;font-size:14px;color:var(--green);font-weight:700;display:none;margin-bottom:.85rem}
.answer-box.show{display:block}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.85rem}
.opt-prev{background:var(--bg);border:1.5px solid var(--bd);border-radius:10px;padding:.6rem .9rem;font-size:13px;display:flex;align-items:center;gap:.5rem}
.opt-prev.correct-opt{background:var(--greenl);border-color:#90D4A8;color:var(--green);font-weight:600}
.opt-ltr{width:24px;height:24px;border-radius:50%;background:var(--bd);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--muted);flex-shrink:0;font-family:'Nunito',sans-serif}
.correct-opt .opt-ltr{background:var(--green);color:#fff}
.timer-block{background:var(--purplel);border-radius:12px;padding:.85rem 1rem;text-align:center;display:none}
.timer-big{font-family:'Nunito',sans-serif;font-weight:900;font-size:2.8rem;color:var(--purple);line-height:1}
.timer-big.urg{color:var(--coral)}
.timer-track{height:8px;background:rgba(91,91,214,.2);border-radius:4px;margin-top:.5rem;overflow:hidden}
.timer-fill{height:100%;background:var(--purple);border-radius:4px;transition:width .25s linear}
.timer-fill.urg{background:var(--coral)}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:.65rem}
.btn{width:100%;padding:14px;border-radius:14px;border:none;font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.4rem;min-height:52px;touch-action:manipulation}
.btn:disabled{opacity:.38;cursor:not-allowed}
.btn-purple{background:var(--purple);color:#fff;grid-column:1/-1;font-size:16px;padding:15px}
.btn-amber{background:var(--amber);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-coral{background:var(--coral);color:#fff;grid-column:1/-1}
.btn-teal{background:#0F6E56;color:#fff;grid-column:1/-1}
.btn-red{background:#C0392B;color:#fff}
.qdots{display:flex;flex-wrap:wrap;gap:.5rem}
.qdot{width:38px;height:38px;border-radius:50%;border:2px solid var(--bd);background:var(--bg);font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;touch-action:manipulation}
.qdot.done{background:var(--greenl);border-color:var(--green);color:var(--green)}
.qdot.active{background:var(--purple);border-color:var(--purple);color:#fff}
.live-row{display:flex;align-items:center;gap:.5rem;font-size:12px;color:var(--coral);font-weight:700}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--coral);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.lb-row{display:flex;align-items:center;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--bd)}
.lb-row:last-child{border-bottom:none}
.lb-left{display:flex;align-items:center;gap:.5rem}
.lb-medal{font-size:1.1rem;min-width:22px}
.lb-team{font-weight:500;font-size:14px}
.lb-email{font-size:11px;color:var(--muted)}
.lb-score{font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;color:var(--purple)}
.lb-empty{text-align:center;font-size:13px;color:var(--muted);padding:1.25rem 0}
.rxn-item{display:flex;align-items:center;gap:.6rem;padding:.35rem 0;border-bottom:1px solid var(--bd);font-size:13px}
.rxn-item:last-child{border-bottom:none}
.round-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-top:.5rem}
.rs-card{background:var(--bg);border-radius:10px;padding:.6rem .75rem;text-align:center;border:1.5px solid var(--bd)}
.rs-card.active{border-color:var(--purple);background:var(--purplel)}
.rs-card.done{border-color:var(--green);background:var(--greenl)}
.rs-num{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.3rem;color:var(--purple)}
.rs-lbl{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.sponsor-footer{background:#FEF3DC;border-top:1.5px solid #F5D09A;padding:.65rem 1.5rem;display:flex;align-items:center;justify-content:center;gap:.75rem;flex-shrink:0}
.sf-label{font-size:10px;font-weight:700;color:#8A5500;text-transform:uppercase;letter-spacing:.1em;font-family:'Nunito',sans-serif;white-space:nowrap}
</style>
</head>

function getRoundQuestions(){

  grid.innerHTML = q.o.map(function(opt,i){
    return '<div class="opt-prev'+(i===q.a?' correct-opt':'')+'"><div class="opt-ltr">'+String.fromCharCode(65+i)+'</div>'+opt+'</div>';
  }).join('');
  document.getElementById('btn-launch').disabled = false;
  document.getElementById('btn-reveal').disabled = true;
  document.getElementById('btn-pause').disabled = true;
}

function launchQ(){
  var qs = getRoundQuestions();
  var q = qs[selQ];
  if(!q || !db) return;
  var ts = Date.now();
  db.ref('host/command').set({action:'question',round:curRound,index:selQ,timestamp:ts});
  db.ref('game/rounds/r'+curRound+'/q'+selQ).set(q);
  // Start local timer display
  clearInterval(timer);
  timerVal = 10;
  var block = document.getElementById('timer-block');
  var big = document.getElementById('timer-big');
  var fill = document.getElementById('timer-fill');
  block.style.display='block';
  big.textContent = timerVal;
  big.className = 'timer-big';
  fill.style.width='100%';
  fill.className = 'timer-fill';
  timer = setInterval(function(){
    timerVal--;
    big.textContent = timerVal;
    fill.style.width = (timerVal/10*100)+'%';
    if(timerVal <= 3){ big.className='timer-big urg'; fill.className='timer-fill urg'; }
    if(timerVal <= 0){ clearInterval(timer); }
  }, 1000);
  document.getElementById('btn-launch').disabled = true;
  document.getElementById('btn-pause').disabled = false;
  document.getElementById('btn-reveal').disabled = false;
  document.getElementById('status-val').textContent = 'Round '+curRound+' — Q'+(selQ+1)+' live';
}

function pauseQ(){
  if(!db) return;
  db.ref('host/command').set({action:'pause',round:curRound,index:selQ,timestamp:Date.now()});
  clearInterval(timer);
  document.getElementById('status-val').textContent = 'Paused';
}

function revealQ(){
  if(!db) return;
  clearInterval(timer);
  db.ref('host/command').set({action:'reveal',round:curRound,index:selQ,timestamp:Date.now()});
  var qs = getRoundQuestions();
  var q = qs[selQ];
  if(q){
    var ab = document.getElementById('answer-box');
    ab.textContent = '&#x2705; Answer: ' + q.o[q.a];
    ab.className = 'answer-box show';
    ab.innerHTML = '&#x2705; <strong>Answer:</strong> ' + q.o[q.a];
  }
  document.getElementById('btn-break').disabled = false;
  // Auto advance dot
  var qs2 = getRoundQuestions();
  if(selQ < qs2.length-1){
    selQ++;
    renderDots();
    renderQuestion();
  }
}

function endRound(){
  if(!db) return;
  clearInterval(timer);
  db.ref('host/command').set({action:'roundbreak',round:curRound,timestamp:Date.now()});
  document.getElementById('status-val').textContent = 'Round '+curRound+' complete — on break';
  document.getElementById('btn-break').disabled = true;
  if(curRound < 3){
    var next = curRound+1;
    document.getElementById('rtab'+curRound).className='rtab done';
    selRound(next);
  } else {
    document.getElementById('btn-endgame').style.display='block';
  }
}

function endGame(){
  if(!db) return;
  db.ref('host/command').set({action:'results',round:3,timestamp:Date.now()});
  document.getElementById('status-val').textContent = 'Game over — results shown';
}

function resetGame(){
  if(!confirm('Reset scores & round progress? Teams stay registered.')) return;
  if(!db) return;
  db.ref('scores').remove();
  db.ref('live_scores').remove();
  db.ref('reactions').remove();
  db.ref('race').remove();
  db.ref('host/command').set({action:'reset',timestamp:Date.now()});
  selRound(1);
  document.getElementById('status-val').textContent = 'Scores reset — teams still registered';
  document.getElementById('btn-endgame').style.display='none';
}
function resetAll(){
  if(!confirm('Wipe everything? Scores and teams will be deleted.')) return;
  if(!db) return;
  db.ref('scores').remove();
  db.ref('live_scores').remove();
  db.ref('teams').remove();
  db.ref('reactions').remove();
  db.ref('race').remove();
  db.ref('host/command').set({action:'reset',timestamp:Date.now()});
  selRound(1);
  document.getElementById('status-val').textContent = 'Full reset complete';
  document.getElementById('lb-list').innerHTML = '<div class="lb-empty">No teams yet</div>';
  document.getElementById('btn-endgame').style.display='none';
}

// ── Live leaderboard listener ──────────────────────────────────────
if(db){
  db.ref('live_scores').on('value', function(snap){
    var data = snap.val() || {};
    var teams = Object.entries(data).map(function(e){
      return {name:e[0], pts: Object.values(e[1]).reduce(function(a,b){return a+b;},0)};
    }).sort(function(a,b){return b.pts-a.pts;});
    var el = document.getElementById('lb-list');
    if(!teams.length){ el.innerHTML='<div class="lb-empty">No scores yet</div>'; return; }
    el.innerHTML = teams.map(function(t,i){
      return '<div class="lb-row"><div class="lb-left"><div class="lb-medal">'+(MEDALS[i]||'')+'</div><div class="lb-team">'+t.name+'</div></div><div class="lb-score">'+t.pts+' pts</div></div>';
    }).join('');
  });

  // ── Team counts listener ──────────────────────────────────────────
  db.ref('teams').on('value', function(snap){
    var data = snap.val() || {};
    var wait=0,play=0,done=0;
    Object.values(data).forEach(function(t){
      if(t.status==='waiting') wait++;
      else if(t.status==='playing') play++;
      else if(t.status==='finished') done++;
    });
    document.getElementById('cnt-wait').textContent = wait;
    document.getElementById('cnt-play').textContent = play;
    document.getElementById('cnt-done').textContent = done;
  });

  // ── Reactions listener ───────────────────────────────────────────
  db.ref('reactions').limitToLast(20).on('value', function(snap){
    var data = snap.val() || {};
    var rxns = Object.values(data).reverse();
    var el = document.getElementById('rxn-list');
    if(!rxns.length){ el.innerHTML='<div class="lb-empty">No reactions yet</div>'; return; }
    el.innerHTML = rxns.map(function(r){
      return '<div class="rxn-item"><span>'+r.emoji+'</span><span><strong>'+r.team+'</strong> — '+r.label+'</span></div>';
    }).join('');
  });
}

// Init
selRound(1);
renderDots();
renderQuestion();
</script>
</body>
</html>
