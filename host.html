<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Host Panel — Screenshot Quiz Night</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0B0B1A;--surface:#141428;--surface2:#1C1C36;--surface3:#252542;
  --purple:#7C6EF6;--purple-dim:#5B50C8;--purple-glow:rgba(124,110,246,.25);
  --coral:#FF5C8A;--coral-glow:rgba(255,92,138,.2);
  --gold:#FFB740;--gold-dim:#CC9233;
  --green:#3DDC84;--green-dim:#2BAF68;--green-bg:rgba(61,220,132,.12);
  --red:#FF4B5C;--red-bg:rgba(255,75,92,.12);
  --amber:#E8930A;--amber-bg:rgba(255,183,64,.12);
  --text:#EEEEFF;--text-dim:#8888BB;--text-muted:#5555AA;
  --border:rgba(124,110,246,.15);--border2:rgba(124,110,246,.08);
  --r:16px;
  --font-display:'Outfit',sans-serif;
  --font-mono:'Space Mono',monospace;
}
html,body{min-height:100vh;background:var(--bg);font-family:var(--font-display);color:var(--text);display:flex;flex-direction:column}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,110,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(124,110,246,.03) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;z-index:0}
.hdr{background:var(--purple-dim);padding:.7rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 16px rgba(0,0,0,.3);position:relative;z-index:10}
.hdr-title{font-weight:900;font-size:1rem;color:#fff}
.host-badge{background:var(--coral);color:#fff;font-weight:800;font-size:12px;padding:4px 14px;border-radius:20px}
.game-chip{display:flex;align-items:center;gap:.5rem;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:5px 14px;font-weight:800;font-size:12px;color:#fff}
.chip-dot{width:8px;height:8px;border-radius:50%;background:#8888BB;display:inline-block}
@keyframes chipPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.main{max-width:720px;margin:0 auto;padding:1.5rem;display:flex;flex-direction:column;gap:1rem;flex:1;width:100%;position:relative;z-index:1}
.card{background:var(--surface);border-radius:var(--r);padding:1.25rem 1.5rem;border:1px solid var(--border)}
.slabel{font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.7rem}
.status-bar{display:flex;align-items:center;justify-content:space-between;border-left:5px solid var(--purple);flex-wrap:wrap;gap:.75rem}
.status-val{font-weight:900;font-size:1rem}
.count-pills{display:flex;gap:.4rem;flex-wrap:wrap}
.pill{font-weight:800;font-size:.8rem;padding:.25rem .75rem;border-radius:20px}
.pill-wait{background:var(--amber-bg);color:var(--gold)}
.pill-play{background:rgba(124,110,246,.12);color:var(--purple)}
.pill-done{background:var(--green-bg);color:var(--green)}
.round-tabs{display:flex;gap:.5rem;margin-bottom:1rem}
.rtab{flex:1;padding:.55rem;border-radius:10px;border:2px solid var(--border);background:var(--surface2);font-weight:800;font-size:.8rem;cursor:pointer;text-align:center;color:var(--text-dim);font-family:var(--font-display)}
.rtab.active{border-color:var(--purple);background:rgba(124,110,246,.12);color:var(--purple)}
.rtab.done{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.qdots{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.5rem}
.qdot{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:var(--surface2);font-weight:800;font-size:12px;color:var(--text-dim);cursor:pointer;font-family:var(--font-mono);display:flex;align-items:center;justify-content:center}
.qdot.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.q-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.q-title{font-weight:900;font-size:.9rem}
.cpill{font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px}
.cat-h{background:rgba(255,183,64,.1);color:var(--gold)}.cat-f{background:rgba(255,92,138,.1);color:var(--coral)}
.cat-m{background:rgba(124,110,246,.1);color:var(--purple)}.cat-s{background:rgba(61,220,132,.1);color:var(--green)}.cat-x{background:rgba(136,136,187,.1);color:var(--text-dim)}
.q-text{font-weight:800;font-size:1rem;line-height:1.4;margin-bottom:.75rem}
.answer-box{background:var(--green-bg);border:1px solid rgba(61,220,132,.3);border-radius:10px;padding:.6rem 1rem;font-size:14px;color:var(--green);font-weight:700;display:none;margin-bottom:.75rem}
.answer-box.show{display:block}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;margin-bottom:.75rem}
.opt-prev{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.5rem .8rem;font-size:12px;display:flex;align-items:center;gap:.4rem;color:var(--text-dim)}
.opt-prev.correct-opt{background:var(--green-bg);border-color:rgba(61,220,132,.3);color:var(--green);font-weight:600}
.opt-ltr{width:22px;height:22px;border-radius:50%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--text-muted);flex-shrink:0;font-family:var(--font-mono)}
.correct-opt .opt-ltr{background:var(--green);color:#000}
.timer-block{background:rgba(124,110,246,.08);border-radius:12px;padding:.75rem;text-align:center;display:none;margin-bottom:.75rem}
.timer-big{font-family:var(--font-mono);font-weight:900;font-size:2.5rem;color:var(--purple);line-height:1}
.timer-big.urg{color:var(--coral)}
.timer-track{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;margin-top:.4rem}
.timer-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--coral));border-radius:3px;transition:width .25s linear}
.timer-fill.urg{background:var(--coral)}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.btn{padding:.65rem 1rem;border-radius:12px;font-weight:800;font-size:.85rem;cursor:pointer;border:none;font-family:var(--font-display);transition:all .12s;min-height:44px}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn:active:not(:disabled){transform:scale(.97)}
.btn-purple{background:var(--purple);color:#fff}
.btn-amber{background:var(--gold);color:#000}
.btn-green{background:var(--green);color:#000}
.btn-coral{background:var(--coral);color:#fff}
.btn-teal{background:#2DD4BF;color:#000}
.btn-red{background:var(--red);color:#fff}
.lb-row{background:var(--surface2);border-radius:12px;padding:.6rem .9rem;display:flex;align-items:center;gap:.6rem;margin-bottom:.35rem;border:1px solid var(--border2)}
.lb-row .lb-left{display:flex;align-items:center;gap:.5rem;flex:1}
.lb-row .lb-medal{font-size:1rem;min-width:22px}
.lb-row .lb-team{font-weight:800;font-size:.85rem}
.lb-row .lb-score{font-family:var(--font-mono);font-weight:900;color:var(--purple);font-size:.9rem}
.lb-empty{text-align:center;padding:1.5rem;color:var(--text-dim);font-size:13px}
.live-row{display:flex;align-items:center;gap:.4rem;font-size:12px;font-weight:800;color:var(--coral)}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--coral);animation:chipPulse 1.2s infinite}
.rxn-item{display:flex;align-items:center;gap:.5rem;padding:.35rem 0;font-size:13px;border-bottom:1px solid var(--border2)}
/* SPONSOR FOOTER */
.sponsor-footer{background:linear-gradient(90deg,#E85D24 0%,#D14520 100%);padding:12px 24px;display:flex;align-items:center;justify-content:center;gap:14px;flex-shrink:0;margin-top:auto}
.sponsor-label{font-size:11px;font-weight:600;color:rgba(255,255,255,.75);letter-spacing:.1em;text-transform:uppercase}
.sponsor-name{font-weight:900;font-size:15px;color:#fff;letter-spacing:.02em}
.sponsor-tagline{font-size:12px;color:rgba(255,255,255,.85)}
.sponsor-divider{width:1px;height:16px;background:rgba(255,255,255,.3)}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-title">🎛️ Host Panel</div>
  <div class="game-chip" id="game-chip"><span class="chip-dot" id="chip-dot"></span><span id="chip-text">Ready</span></div>
  <div class="host-badge">HOST</div>
</div>
<div class="main">
  <div class="card status-bar">
    <div><div class="slabel" style="margin-bottom:.2rem">Status</div><div class="status-val" id="status-val">Ready to start Round 1</div></div>
    <div class="count-pills">
      <div class="pill pill-wait">⏳ <span id="cnt-wait">0</span> waiting</div>
      <div class="pill pill-play">🎮 <span id="cnt-play">0</span> playing</div>
      <div class="pill pill-done">✅ <span id="cnt-done">0</span> done</div>
    </div>
  </div>
  <div class="card">
    <div class="round-tabs">
      <button class="rtab active" id="rtab1" onclick="selRound(1)">Round 1</button>
      <button class="rtab" id="rtab2" onclick="selRound(2)">Round 2</button>
      <button class="rtab" id="rtab3" onclick="selRound(3)">Round 3</button>
    </div>
    <div class="qdots" id="qdots"></div>
    <div style="margin-top:.75rem">
      <div class="q-header"><div class="q-title" id="q-title">Q1 / 10</div><div class="cpill" id="q-cat"></div></div>
      <div class="q-text" id="q-text"></div>
      <div class="answer-box" id="answer-box"></div>
      <div class="opts-grid" id="opts-grid"></div>
    </div>
    <div class="timer-block" id="timer-block"><div class="timer-big" id="timer-big">10</div><div class="timer-track"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div></div>
    <div class="controls" style="margin-top:.75rem">
      <button class="btn btn-purple" id="btn-launch" onclick="launchQ()">🚀 Launch Question</button>
      <button class="btn btn-amber" id="btn-pause" onclick="pauseQ()" disabled>⏸ Pause</button>
      <button class="btn btn-green" id="btn-reveal" onclick="revealQ()" disabled>✅ Reveal & Stop</button>
      <button class="btn btn-coral" id="btn-break" onclick="endRound()" disabled>⏭ End Round</button>
      <button class="btn btn-teal" id="btn-endgame" onclick="endGame()" style="display:none;grid-column:1/-1">🏆 End Game & Results</button>
    </div>
  </div>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem">
      <div class="slabel" style="margin-bottom:0">Live Leaderboard</div>
      <div class="live-row"><div class="ldot"></div> Live</div>
    </div>
    <div id="lb-list"><div class="lb-empty">No teams yet</div></div>
  </div>
  <div class="card">
    <div class="slabel">💬 Live Reactions</div>
    <div id="rxn-list"><div class="lb-empty">Reactions will appear here</div></div>
  </div>
  <div class="card">
    <div class="slabel">⚠️ Danger Zone</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">
      <button class="btn btn-amber" onclick="resetGame()">🔄 Reset Scores</button>
      <button class="btn btn-red" onclick="resetAll()">🗑 Reset Everything</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
var CC={h:'cat-h',f:'cat-f',m:'cat-m',g:'cat-x',s:'cat-s',x:'cat-x'};
var MEDALS=['🥇','🥈','🥉'];
var db=null,curRound=1,selQ=0,timer=null,timerVal=10,teamCount=0;
var roundDone=[false,false,false],roundStarted=[false,false,false];

var QUESTIONS=[
{cat:'h',lb:'History',q:'What year did the Morant Bay Rebellion take place?',o:['1831','1865','1882','1907'],a:1},
{cat:'h',lb:'History',q:'Which national hero is known as Father of the Nation?',o:['Norman Manley','Paul Bogle','Marcus Garvey','Alexander Bustamante'],a:3},
{cat:'h',lb:'History',q:'The 1831 Christmas Rebellion was led by which preacher?',o:['Paul Bogle','Sam Sharpe','Cudjoe','Nanny'],a:1},
{cat:'h',lb:'History',q:'Which pirate captain was most associated with Port Royal in the 1670s?',o:['Henry Morgan','Horatio Nelson','Francis Drake','Edward Teach'],a:0},
{cat:'h',lb:'History',q:'Which parish is the birthplace of Marcus Garvey?',o:['Kingston','St. Ann','St. Elizabeth','Westmoreland'],a:1},
{cat:'h',lb:'History',q:'In what year did Jamaica first participate in the Olympics?',o:['1936','1948','1952','1960'],a:1},
{cat:'m',lb:'Music',q:'Which genre preceded reggae in Jamaica in the 1960s?',o:['Calypso','Mento','Rocksteady','Ska'],a:3},
{cat:'m',lb:'Music',q:"What was Bob Marley's full birth name?",o:['Robert Nesta Marley','Neville Livingston','Winston McIntosh','Robbie Marley'],a:0},
{cat:'m',lb:'Music',q:'Which neighbourhood is most associated with the birth of dancehall?',o:['Trench Town','Tivoli Gardens','August Town','Arnett Gardens'],a:1},
{cat:'m',lb:'Music',q:"Sean Paul's hit Temperature was released in which year?",o:['2003','2005','2007','2009'],a:1},
{cat:'m',lb:'Music',q:'Which artist is known as the King of Dancehall?',o:['Buju Banton','Damian Marley','Busy Signal','Beenie Man'],a:3},
{cat:'m',lb:'Music',q:'Rocksteady music emerged in Jamaica in which decade?',o:['1950s','1960s','1970s','1980s'],a:1},
{cat:'f',lb:'Food',q:'Which part of the ackee fruit is toxic if eaten unripe?',o:['The seed','The aril','The husk','The root'],a:0},
{cat:'f',lb:'Food',q:'What is festival in Jamaican cuisine?',o:['A sweet fried dumpling','A fish soup','A cornmeal porridge','A sugarcane drink'],a:0},
{cat:'f',lb:'Food',q:'Blue Mountain coffee is grown at what minimum altitude?',o:['500m','1000m','1500m','2000m'],a:2},
{cat:'f',lb:'Food',q:'Which dish is made from goat offal and said to be an aphrodisiac?',o:['Pepper pot','Cow foot soup','Mannish water','Run down'],a:2},
{cat:'f',lb:'Food',q:'What is the main ingredient in Jamaican run down?',o:['Saltfish','Mackerel in coconut milk','Ackee','Callaloo'],a:1},
{cat:'f',lb:'Food',q:'Which spice is essential to authentic Jamaican jerk seasoning?',o:['Cumin','Allspice','Turmeric','Coriander'],a:1},
{cat:'s',lb:'Sports',q:"Usain Bolt's 9.58s world record was set at which championship?",o:['2008 Beijing Olympics','2009 Berlin Worlds','2012 London Olympics','2011 Daegu Worlds'],a:1},
{cat:'s',lb:'Sports',q:'Which Jamaican won 100m gold at BOTH the 2016 and 2020 Olympics?',o:['Shelly-Ann Fraser-Pryce','Elaine Thompson-Herah','Veronica Campbell-Brown','Merlene Ottey'],a:1},
{cat:'s',lb:'Sports',q:'The Jamaican bobsled team first competed in the Olympics in which year?',o:['1984','1988','1992','1994'],a:1},
{cat:'s',lb:'Sports',q:'Merlene Ottey competed in how many Olympic Games?',o:['4','5','6','7'],a:2},
{cat:'s',lb:'Sports',q:'Which Jamaican cricketer is the West Indies all-time leading run scorer?',o:['Michael Holding','Courtney Walsh','Chris Gayle','George Headley'],a:2},
{cat:'s',lb:'Sports',q:'How many World Championship 100m gold medals has Shelly-Ann Fraser-Pryce won?',o:['3','4','5','6'],a:2},
{cat:'x',lb:'General',q:'What is the motto of Jamaica?',o:['One Love One Heart','Out of Many One People','Forward Ever Backward Never','Unity is Strength'],a:1},
{cat:'x',lb:'General',q:"Kingston became Jamaica's capital in which year?",o:['1692','1703','1872','1962'],a:2},
{cat:'x',lb:'General',q:'Which of these is NOT a Jamaican parish?',o:['Trelawny','Hanover','Portland','Bridgeton'],a:3},
{cat:'x',lb:'General',q:'The Doctor Bird is a type of what?',o:['Parrot','Hummingbird','Kingfisher','Finch'],a:1},
{cat:'x',lb:'General',q:"What is Jamaica's longest river?",o:['Black River','Rio Cobre','Rio Minho','White River'],a:0},
{cat:'x',lb:'General',q:'Which city is NOT in Jamaica?',o:['Montego Bay','Ocho Rios','Nassau','Mandeville'],a:2}
];

function setChip(state,label){
  var dot=document.getElementById('chip-dot'),lbl=document.getElementById('chip-text'),chip=document.getElementById('game-chip');
  if(!lbl)return;
  var cfg={waiting:{text:'Waiting for teams',color:'#8888BB',pulse:false},ready:{text:'Ready to launch',color:'#FFB740',pulse:false},live:{text:'Live',color:'#FF5C8A',pulse:true},paused:{text:'Paused',color:'#FFB740',pulse:false},revealed:{text:'Revealed',color:'#7C6EF6',pulse:false},break:{text:'Round break',color:'#FFB740',pulse:false},ended:{text:'Game over',color:'#3DDC84',pulse:false}};
  var s=cfg[state]||cfg.waiting;
  lbl.textContent=label||s.text;
  if(dot){dot.style.background=s.color;dot.style.animation=s.pulse?'chipPulse 1.2s infinite':'none';}
}

try{firebase.initializeApp({apiKey:"AIzaSyBoxCE9DY4VCHiq8beeaGmX5237KiPuFWA",authDomain:"screenshot-trivia-night.firebaseapp.com",databaseURL:"https://screenshot-trivia-night-default-rtdb.firebaseio.com",projectId:"screenshot-trivia-night",storageBucket:"screenshot-trivia-night.firebasestorage.app",messagingSenderId:"482758352954",appId:"1:482758352954:web:832d1cba008bc0b789d503"});db=firebase.database();}catch(e){console.error(e);}

function selRound(r){
  if(r===2&&!roundDone[0]){alert('Complete Round 1 first.');return;}
  if(r===3&&!roundDone[1]){alert('Complete Round 2 first.');return;}
  curRound=r;selQ=0;
  [1,2,3].forEach(function(n){var t=document.getElementById('rtab'+n);t.className='rtab'+(roundDone[n-1]?' done':n===r?' active':'');});
  renderDots();renderQuestion();
  document.getElementById('btn-break').disabled=true;
  document.getElementById('btn-reveal').disabled=true;
  document.getElementById('btn-pause').disabled=true;
  document.getElementById('answer-box').className='answer-box';
  document.getElementById('timer-block').style.display='none';
  if(teamCount>0&&!roundDone[r-1])document.getElementById('btn-launch').disabled=false;
  document.getElementById('status-val').textContent='Ready for Round '+r;
}

function getRoundQuestions(){var all=QUESTIONS.slice();var per=Math.ceil(all.length/3);var start=(curRound-1)*per;return all.slice(start,start+per);}
function renderDots(){var qs=getRoundQuestions();document.getElementById('qdots').innerHTML=qs.map(function(q,i){return '<button class="qdot'+(i===selQ?' active':'')+'" onclick="selQuestion('+i+')">'+(i+1)+'</button>';}).join('');}
function selQuestion(i){selQ=i;renderDots();renderQuestion();}

function renderQuestion(){
  var qs=getRoundQuestions(),q=qs[selQ];if(!q)return;
  document.getElementById('q-title').textContent='Q'+(selQ+1)+' / '+qs.length;
  var catEl=document.getElementById('q-cat');catEl.textContent=q.lb;catEl.className='cpill '+(CC[q.cat]||'cat-x');
  document.getElementById('q-text').textContent=q.q;
  var ab=document.getElementById('answer-box');if(!ab.classList.contains('show')){ab.className='answer-box';ab.innerHTML='';}
  document.getElementById('opts-grid').innerHTML=q.o.map(function(opt,i){return '<div class="opt-prev'+(i===q.a?' correct-opt':'')+'"><div class="opt-ltr">'+String.fromCharCode(65+i)+'</div>'+opt+'</div>';}).join('');
}

function launchQ(){
  var qs=getRoundQuestions(),q=qs[selQ];if(!q||!db)return;
  if(teamCount===0){alert('No teams registered yet.');return;}
  var ts=Date.now();
  if(!window.roundStarted)window.roundStarted=[false,false,false];
  window.roundStarted[curRound-1]=true;
  db.ref('teams').once('value',function(snap){var teams=snap.val()||{};Object.keys(teams).forEach(function(k){if(teams[k].status==='waiting')db.ref('teams/'+k+'/status').set('playing');});});
  db.ref('game/current').set({round:curRound,index:selQ,question:q,timestamp:ts});
  db.ref('host/command').set({action:'question',round:curRound,index:selQ,timestamp:ts});
  clearInterval(timer);timerVal=10;
  var block=document.getElementById('timer-block'),big=document.getElementById('timer-big'),fill=document.getElementById('timer-fill');
  block.style.display='block';big.textContent=timerVal;big.className='timer-big';fill.style.width='100%';fill.className='timer-fill';
  timer=setInterval(function(){timerVal--;big.textContent=timerVal;fill.style.width=((timerVal/10)*100)+'%';if(timerVal<=3){big.className='timer-big urg';fill.className='timer-fill urg';}if(timerVal<=0){clearInterval(timer);big.textContent='0';}},1000);
  document.getElementById('btn-launch').disabled=true;
  document.getElementById('btn-pause').disabled=false;
  document.getElementById('btn-reveal').disabled=false;
  document.getElementById('btn-break').disabled=true;
  document.getElementById('status-val').textContent='⏱ Round '+curRound+' — Q'+(selQ+1)+' LIVE!';
  setChip('live','Q'+(selQ+1)+' live');
  document.getElementById('answer-box').className='answer-box';
}

function pauseQ(){
  if(!db)return;clearInterval(timer);
  db.ref('host/command').set({action:'pause',round:curRound,index:selQ,timestamp:Date.now()});
  document.getElementById('btn-pause').disabled=true;
  document.getElementById('status-val').textContent='⏸ Paused — Q'+(selQ+1);
  setChip('paused');
}

function revealQ(){
  if(!db)return;clearInterval(timer);
  db.ref('host/command').set({action:'reveal',round:curRound,index:selQ,timestamp:Date.now()});
  var qs=getRoundQuestions(),q=qs[selQ];
  if(q){document.getElementById('answer-box').innerHTML='✅ <strong>Answer:</strong> '+q.o[q.a];document.getElementById('answer-box').className='answer-box show';}
  document.getElementById('btn-reveal').disabled=true;document.getElementById('btn-pause').disabled=true;
  var isLastQ=selQ>=getRoundQuestions().length-1;
  if(isLastQ){document.getElementById('btn-launch').disabled=true;document.getElementById('btn-break').disabled=false;document.getElementById('status-val').textContent='Round '+curRound+' complete — click End Round';setChip('revealed','Round '+curRound+' done');}
  else{selQ++;document.getElementById('timer-block').style.display='none';renderDots();renderQuestion();document.getElementById('btn-launch').disabled=false;document.getElementById('btn-break').disabled=false;document.getElementById('status-val').textContent='👉 Preview: Q'+(selQ+1)+' — Launch when ready';setChip('ready','Q'+(selQ+1)+' preview');}
}

function endRound(){
  if(!db)return;clearInterval(timer);roundDone[curRound-1]=true;
  db.ref('host/command').set({action:'round_end',round:curRound,timestamp:Date.now()});
  document.getElementById('rtab'+curRound).className='rtab done';
  document.getElementById('btn-break').disabled=true;document.getElementById('btn-launch').disabled=true;document.getElementById('btn-reveal').disabled=true;
  if(curRound<3){var next=curRound+1;document.getElementById('status-val').textContent='Round '+curRound+' done — Start Round '+next+' when ready.';setChip('break','Round '+curRound+' break');selRound(next);}
  else{db.ref('teams').once('value',function(snap){var teams=snap.val()||{};Object.keys(teams).forEach(function(k){if(teams[k].status==='playing')db.ref('teams/'+k+'/status').set('finished');});});document.getElementById('status-val').textContent='All rounds complete!';setChip('ended');document.getElementById('btn-endgame').style.display='block';}
}

function endGame(){if(!db)return;db.ref('host/command').set({action:'end',round:3,timestamp:Date.now()});document.getElementById('status-val').textContent='Game over — results shown';setChip('ended');}

function resetGame(){
  if(!confirm('Reset scores? Teams stay registered.'))return;if(!db)return;
  db.ref('scores').remove();db.ref('live_scores').remove();db.ref('reactions').remove();db.ref('race').remove();db.ref('game/current').remove();db.ref('host/command').set({action:'reset',timestamp:Date.now()});
  roundDone=[false,false,false];roundStarted=[false,false,false];clearInterval(timer);
  document.getElementById('btn-pause').disabled=true;document.getElementById('btn-reveal').disabled=true;document.getElementById('btn-break').disabled=true;document.getElementById('btn-endgame').style.display='none';document.getElementById('timer-block').style.display='none';document.getElementById('answer-box').className='answer-box';
  [1,2,3].forEach(function(n){document.getElementById('rtab'+n).className='rtab'+(n===1?' active':'');});
  selRound(1);setChip('ready');document.getElementById('status-val').textContent='Scores reset — teams still registered';
}
function resetAll(){
  if(!confirm('Wipe everything?'))return;if(!db)return;
  db.ref('scores').remove();db.ref('live_scores').remove();db.ref('teams').remove();db.ref('reactions').remove();db.ref('race').remove();db.ref('game').remove();db.ref('host/command').set({action:'reset',timestamp:Date.now()});
  roundDone=[false,false,false];roundStarted=[false,false,false];teamCount=0;clearInterval(timer);
  document.getElementById('cnt-wait').textContent='0';document.getElementById('cnt-play').textContent='0';document.getElementById('cnt-done').textContent='0';
  document.getElementById('btn-launch').disabled=true;document.getElementById('btn-pause').disabled=true;document.getElementById('btn-reveal').disabled=true;document.getElementById('btn-break').disabled=true;document.getElementById('btn-endgame').style.display='none';document.getElementById('timer-block').style.display='none';document.getElementById('answer-box').className='answer-box';
  [1,2,3].forEach(function(n){document.getElementById('rtab'+n).className='rtab'+(n===1?' active':'');});
  selRound(1);setChip('waiting');document.getElementById('status-val').textContent='Reset complete — waiting for teams';
}

if(db){
  db.ref('live_scores').on('value',function(snap){
    var data=snap.val()||{};var teams=Object.entries(data).map(function(e){var s=e[1];return{name:s.team||e[0],pts:(s.r0||0)+(s.r1||0)+(s.r2||0)};}).sort(function(a,b){return b.pts-a.pts;});
    var el=document.getElementById('lb-list');
    if(!teams.length){el.innerHTML='<div class="lb-empty">No scores yet</div>';return;}
    el.innerHTML=teams.map(function(t,i){return '<div class="lb-row"><div class="lb-left"><div class="lb-medal">'+(MEDALS[i]||'')+'</div><div class="lb-team">'+t.name+'</div></div><div class="lb-score">'+t.pts+' pts</div></div>';}).join('');
  });
  db.ref('teams').on('value',function(snap){
    var data=snap.val()||{},wait=0,play=0,done=0;
    Object.values(data).forEach(function(t){if(t.status==='waiting')wait++;else if(t.status==='playing')play++;else if(t.status==='finished')done++;});
    teamCount=wait+play+done;
    document.getElementById('cnt-wait').textContent=wait;document.getElementById('cnt-play').textContent=play;document.getElementById('cnt-done').textContent=done;
    if(wait+play===0&&wait===0){if(done===0){document.getElementById('status-val').textContent='Waiting for teams to join...';setChip('waiting');}}
    else if(document.getElementById('btn-launch').disabled&&document.getElementById('timer-block').style.display!=='block'&&(wait>0||play>0)){document.getElementById('btn-launch').disabled=false;document.getElementById('status-val').textContent=teamCount+' team'+(teamCount!==1?'s':'')+' ready';setChip('ready');}
  });
  db.ref('reactions').limitToLast(20).on('value',function(snap){
    var data=snap.val()||{},rxns=Object.values(data).reverse();
    var el=document.getElementById('rxn-list');
    if(!rxns.length){el.innerHTML='<div class="lb-empty">No reactions yet</div>';return;}
    el.innerHTML=rxns.map(function(r){return '<div class="rxn-item"><span>'+r.emoji+'</span><span><strong>'+r.team+'</strong></span></div>';}).join('');
  });
  db.ref('teams').once('value',function(snap){
    var data=snap.val()||{},waiting=Object.values(data).filter(function(t){return t.status==='waiting';}).length,total=Object.keys(data).length;
    if(waiting>0||total>0){document.getElementById('btn-launch').disabled=false;setChip('ready',total+' team'+(total!==1?'s':'')+' ready');}
    else document.getElementById('btn-launch').disabled=true;
  });
}else{document.getElementById('btn-launch').disabled=true;}

setChip('waiting');selRound(1);
</script>
