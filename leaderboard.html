<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Live Leaderboard — Screenshot Quiz Night</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0B0B1A;--surface:#141428;--surface2:#1C1C36;--surface3:#252542;
  --purple:#7C6EF6;--purple-dim:#5B50C8;--purple-glow:rgba(124,110,246,.25);
  --coral:#FF5C8A;--gold:#FFB740;
  --green:#3DDC84;--green-bg:rgba(61,220,132,.12);
  --text:#EEEEFF;--text-dim:#8888BB;--border:rgba(124,110,246,.15);
  --font-display:'Outfit',sans-serif;--font-mono:'Space Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--font-display);color:var(--text);display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(124,110,246,.08),transparent 60%);pointer-events:none}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,110,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(124,110,246,.03) 1px,transparent 1px);background-size:32px 32px;pointer-events:none}
.header{padding:.8rem 3rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;position:relative;z-index:1}
.header-left{display:flex;align-items:center;gap:1rem}
.header-title{font-weight:900;font-size:1.4rem}
.live-chip{display:inline-flex;align-items:center;gap:.4rem;background:rgba(255,92,138,.1);border:1px solid rgba(255,92,138,.3);color:var(--coral);font-size:12px;font-weight:800;padding:4px 14px;border-radius:20px}
.ldot{width:7px;height:7px;border-radius:50%;background:var(--coral);animation:ldp 1.4s infinite}
@keyframes ldp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.room-chip{display:inline-flex;align-items:center;gap:.4rem;background:rgba(124,110,246,.12);border:1px solid rgba(124,110,246,.3);color:var(--purple);font-size:14px;font-weight:900;padding:6px 18px;border-radius:20px;font-family:var(--font-mono);letter-spacing:.1em}
.main{flex:1;display:grid;grid-template-columns:1fr 300px;overflow:hidden;position:relative;z-index:1}
.board{padding:1rem 2rem 1rem 3rem;display:flex;flex-direction:column;gap:.55rem;overflow-y:auto}
@keyframes rowIn{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)}}
.row{background:var(--surface);border-radius:16px;padding:.9rem 1.5rem;display:flex;align-items:center;gap:1.2rem;border:1px solid var(--border);position:relative;overflow:hidden;animation:rowIn .5s ease forwards}
.row.first{background:linear-gradient(135deg,rgba(124,110,246,.2),var(--surface));border-color:var(--purple);box-shadow:0 0 40px var(--purple-glow)}
.row.first::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,var(--purple-glow),transparent)}
.row.second{background:var(--surface2);border-color:rgba(136,136,187,.3)}
.row.third{background:var(--surface2);border-color:rgba(255,92,138,.2)}
.rank{font-family:var(--font-mono);font-weight:900;font-size:1.6rem;min-width:46px;text-align:center;color:var(--text-dim);position:relative;z-index:1}
.row.first .rank{color:var(--purple)}.row.second .rank{color:#9090CC}.row.third .rank{color:var(--coral)}
.medal{font-size:1.5rem;min-width:34px;text-align:center;position:relative;z-index:1}
.info{flex:1;position:relative;z-index:1}
.team{font-weight:900;font-size:1.15rem;letter-spacing:-.01em}
.row.first .team{color:#fff}
.meta{font-size:12px;color:var(--text-dim);margin-top:.1rem}
.bar-col{flex:1.6;position:relative;z-index:1}
.bar-track{height:8px;background:rgba(255,255,255,.05);border-radius:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--purple-dim),var(--purple));transition:width 1.4s cubic-bezier(.34,1.2,.64,1)}
.row.second .bar-fill{background:linear-gradient(90deg,#5050AA,#8888CC)}
.row.third .bar-fill{background:linear-gradient(90deg,#A04060,var(--coral))}
.row:not(.first):not(.second):not(.third) .bar-fill{background:linear-gradient(90deg,#2A2A50,#4A4A70)}
.score-col{text-align:right;min-width:80px;position:relative;z-index:1}
.score-num{font-family:var(--font-mono);font-weight:900;font-size:1.9rem;line-height:1;color:var(--purple)}
.row.second .score-num{color:#9090CC}.row.third .score-num{color:var(--coral)}
.row:not(.first):not(.second):not(.third) .score-num{color:var(--text-dim)}
.score-den{font-size:11px;color:var(--text-dim)}
/* SIDEBAR */
.sidebar{border-left:1px solid var(--border);padding:1rem 1.5rem;overflow-y:auto;display:flex;flex-direction:column;gap:1rem}
.sidebar-title{font-weight:900;font-size:.9rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em}
.sidebar-card{background:var(--surface);border-radius:16px;padding:1rem;border:1px solid var(--border)}
.qr-wrap{display:flex;flex-direction:column;align-items:center;gap:.5rem}
.qr-box{background:#fff;border-radius:12px;padding:10px;display:flex;align-items:center;justify-content:center;width:180px;height:180px;box-shadow:0 0 20px var(--purple-glow)}
.qr-hint{font-size:12px;color:var(--text-dim);font-weight:600;text-align:center}
.room-display{text-align:center;font-family:var(--font-mono);font-weight:900;font-size:2rem;color:var(--purple);letter-spacing:.15em}
.room-label{text-align:center;font-size:10px;color:var(--text-dim);text-transform:uppercase;font-weight:700;letter-spacing:.1em}
.rxn-item{display:flex;align-items:center;gap:.5rem;font-size:13px;padding:.3rem 0;border-bottom:1px solid rgba(124,110,246,.08)}
.rxn-emoji{font-size:1.2rem}
.rxn-team{font-weight:700;font-size:12px}
.empty-msg{color:var(--text-dim);font-size:13px;text-align:center;padding:1rem}
/* REACTIONS TICKER */
.rxn-ticker{background:var(--surface);border-top:1px solid var(--border);padding:.5rem 2rem;display:flex;align-items:center;gap:1rem;flex-shrink:0;position:relative;z-index:1;overflow:hidden}
.rxn-ticker-label{font-size:11px;font-weight:800;color:var(--coral);white-space:nowrap}
.rxn-ticker-content{flex:1;display:flex;gap:1rem;overflow:hidden}
.rxn-ticker-item{font-size:14px;font-weight:700;white-space:nowrap;display:flex;align-items:center;gap:.3rem}
/* SPONSOR FOOTER */
.sponsor-footer{background:linear-gradient(90deg,#E85D24 0%,#D14520 100%);padding:12px 24px;display:flex;align-items:center;justify-content:center;gap:14px;flex-shrink:0;border-top:1px solid var(--border)}
.sponsor-label{font-size:11px;font-weight:600;color:rgba(255,255,255,.75);letter-spacing:.1em;text-transform:uppercase}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="header-title">🏆 Screenshot Quiz Night</div>
    <div class="live-chip"><span class="ldot"></span> LIVE</div>
  </div>
  <div style="display:flex;align-items:center;gap:1rem">
    <div style="font-size:13px;color:var(--text-dim);font-weight:600" id="round-label">Waiting for game to start...</div>
    <div class="room-chip" id="room-chip" style="display:none"></div>
  </div>
</div>
<div class="main">
  <div class="board" id="board"><div class="empty-msg">Waiting for teams to join...</div></div>
  <div class="sidebar">
    <!-- QR CODE PANEL -->
    <div class="sidebar-card">
      <div class="sidebar-title" style="margin-bottom:.5rem">📱 Join the Game</div>
      <div class="qr-wrap">
        <div class="room-label">Room Code</div>
        <div class="room-display" id="sidebar-room">----</div>
        <div class="qr-box" id="qr-container"></div>
        <div class="qr-hint">Scan to join!</div>
      </div>
    </div>
    <!-- REACTIONS -->
    <div class="sidebar-card" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div class="sidebar-title" style="margin-bottom:.5rem">💬 Reactions</div>
      <div id="rxn-list" style="flex:1;overflow-y:auto"><div class="empty-msg">No reactions yet</div></div>
    </div>
    <!-- GAME INFO -->
    <div style="padding-top:.5rem;border-top:1px solid var(--border)">
      <div class="sidebar-title">📊 Game Info</div>
      <div style="font-size:12px;color:var(--text-dim);margin-top:.4rem">3 Rounds · 5 Questions Each</div>
      <div style="font-size:12px;color:var(--text-dim);margin-top:.2rem">⚡ Speed bonus for fast answers</div>
      <div style="font-size:12px;color:var(--text-dim);margin-top:.2rem">Max score: 600 pts</div>
    </div>
  </div>
</div>
<!-- REACTIONS TICKER -->
<div class="rxn-ticker" id="rxn-ticker" style="display:none">
  <div class="rxn-ticker-label">🔥 LIVE</div>
  <div class="rxn-ticker-content" id="rxn-ticker-content"></div>
</div>
<!-- SPONSOR FOOTER -->
<div class="sponsor-footer">
  <span class="sponsor-label">Tonight brought to you by</span>
  <svg viewBox="0 0 200 50" style="height:36px;width:auto;">
    <text x="100" y="28" text-anchor="middle" font-family="Impact, Haettenschweiler, Arial Narrow Bold, sans-serif" font-size="28" fill="white" font-weight="bold" letter-spacing="2">CHILITOS</text>
    <text x="100" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.85)" letter-spacing="3">— JAMEXICAN FOOD —</text>
  </svg>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
var MEDALS = ['🥇','🥈','🥉'];
var MAX_PTS = 600;
var BASE_URL = window.location.href.replace(/\/[^\/]*$/, '/');
var db = null;
var roomCode = null;

try {
  firebase.initializeApp({
    apiKey: "AIzaSyBoxCE9DY4VCHiq8beeaGmX5237KiPuFWA",
    authDomain: "screenshot-trivia-night.firebaseapp.com",
    databaseURL: "https://screenshot-trivia-night-default-rtdb.firebaseio.com",
    projectId: "screenshot-trivia-night",
    storageBucket: "screenshot-trivia-night.firebasestorage.app",
    messagingSenderId: "482758352954",
    appId: "1:482758352954:web:832d1cba008bc0b789d503"
  });
  db = firebase.database();
} catch(e) { console.error(e); }

// ── GET ROOM CODE ──
function initRoom() {
  var params = new URLSearchParams(window.location.search);
  var room = params.get('room');

  if (room) {
    setRoom(room.toUpperCase());
  } else if (db) {
    // Listen for currentRoom
    db.ref('currentRoom').on('value', function(snap) {
      var code = snap.val();
      if (code) setRoom(code);
    });
  }
}

function setRoom(code) {
  roomCode = code;
  document.getElementById('sidebar-room').textContent = code;
  document.getElementById('room-chip').textContent = code;
  document.getElementById('room-chip').style.display = 'inline-flex';

  // Generate QR
  setTimeout(function() {
    var qrEl = document.getElementById('qr-container');
    qrEl.innerHTML = '';
    var joinUrl = BASE_URL + 'join-v2.html?room=' + code;
    if (typeof QRCode !== 'undefined') {
      new QRCode(qrEl, {
        text: joinUrl,
        width: 160,
        height: 160,
        colorDark: '#0B0B1A',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });
    }
  }, 200);

  // Start listeners
  listenData();
}

// ── LISTEN ──
function listenData() {
  if (!db || !roomCode) return;

  var teamsCache = null, liveCache = null;

  function renderBoard() {
    var el = document.getElementById('board');
    var totals = {};

    if (liveCache) {
      Object.values(liveCache).forEach(function(e) {
        totals[e.team] = {
          team: e.team,
          score: e.total || 0,
          players: e.players || 1,
          r0: e.r0 || 0,
          r1: e.r1 || 0,
          r2: e.r2 || 0
        };
      });
    }

    var teams = teamsCache ? Object.values(teamsCache) : [];
    var sorted = Object.values(totals).sort(function(a,b) { return b.score - a.score; });
    var inGame = {};
    sorted.forEach(function(t) { inGame[t.team] = true; });
    var waiting = teams.filter(function(t) { return !inGame[t.name]; });

    if (!sorted.length && !waiting.length) {
      el.innerHTML = '<div class="empty-msg">Waiting for teams to join...</div>';
      return;
    }

    var maxScore = sorted.length ? sorted[0].score : 1;
    if (maxScore < 1) maxScore = 1;

    var html = '';
    sorted.forEach(function(t, i) {
      var cls = i === 0 ? 'first' : i === 1 ? 'second' : i === 2 ? 'third' : '';
      var pct = Math.round((t.score / maxScore) * 100);
      var rounds = 'R1:' + (t.r0 || 0) + ' · R2:' + (t.r1 || 0) + ' · R3:' + (t.r2 || 0);
      html += '<div class="row ' + cls + '" style="animation-delay:' + (.05 * i) + 's">';
      html += '<div class="rank">' + (i + 1) + '</div>';
      html += '<div class="medal">' + (MEDALS[i] || '') + '</div>';
      html += '<div class="info"><div class="team">' + t.team + '</div><div class="meta">' + rounds + '</div></div>';
      html += '<div class="bar-col"><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div></div>';
      html += '<div class="score-col"><div class="score-num">' + t.score + '</div><div class="score-den">pts</div></div>';
      html += '</div>';
    });

    if (waiting.length > 0) {
      waiting.forEach(function(t) {
        html += '<div class="row" style="opacity:.5;border-style:dashed">';
        html += '<div class="rank">—</div><div class="medal">⏳</div>';
        html += '<div class="info"><div class="team">' + t.name + '</div><div class="meta">' + (t.players || 1) + ' player' + ((t.players || 1) !== 1 ? 's' : '') + ' · waiting</div></div>';
        html += '<div class="bar-col"></div><div class="score-col"><div class="score-num" style="font-size:1rem;color:var(--text-dim)">Ready</div></div>';
        html += '</div>';
      });
    }
    el.innerHTML = html;
  }

  db.ref('games/' + roomCode + '/teams').on('value', function(snap) { teamsCache = snap.val(); renderBoard(); });
  db.ref('games/' + roomCode + '/live_scores').on('value', function(snap) { liveCache = snap.val(); renderBoard(); });

  // Game status
  db.ref('games/' + roomCode + '/status').on('value', function(snap) {
    var status = snap.val();
    var lbl = document.getElementById('round-label');
    if (status === 'playing') lbl.textContent = '🎮 Game in Progress — Self-Paced';
    else if (status === 'ended') lbl.textContent = '🏆 GAME OVER — Final Results!';
    else lbl.textContent = '⏳ Lobby — Waiting for host to start';
  });

  // Reactions
  db.ref('games/' + roomCode + '/reactions').limitToLast(20).on('value', function(snap) {
    var data = snap.val() || {};
    var rxns = Object.values(data).reverse();

    // Sidebar
    var el = document.getElementById('rxn-list');
    if (!rxns.length) {
      el.innerHTML = '<div class="empty-msg">No reactions yet</div>';
    } else {
      el.innerHTML = rxns.map(function(r) {
        return '<div class="rxn-item"><span class="rxn-emoji">' + r.emoji + '</span><span class="rxn-team">' + r.team + '</span></div>';
      }).join('');
    }

    // Ticker
    var ticker = document.getElementById('rxn-ticker');
    var tickerContent = document.getElementById('rxn-ticker-content');
    if (rxns.length > 0) {
      ticker.style.display = 'flex';
      tickerContent.innerHTML = rxns.slice(0, 10).map(function(r) {
        return '<div class="rxn-ticker-item"><span>' + r.emoji + '</span><span style="color:var(--text-dim)">' + r.team + '</span></div>';
      }).join('');
    }
  });
}

initRoom();
</script>
</body>
</html>
