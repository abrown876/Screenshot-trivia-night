<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Live Leaderboard — Screenshot Quiz Night</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#5B5BD6;--purpled:#3D3D9E;--purplel:rgba(91,91,214,.15);
  --purple-dim:#5B5BD6;--purple-glow:rgba(91,91,214,.2);
  --coral:#E8547A;--gold:#F5A623;
  --bg:#0A0A1E;--card:#12122A;--card2:#1A1A35;
  --text:#F0F0FF;--muted:#8888BB;--border:#2A2A50;
  --r:16px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(91,91,214,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(91,91,214,.04) 1px,transparent 1px);background-size:32px 32px;pointer-events:none}

/* SQN TOP BAR */
.sqn-bar{background:var(--purpled);padding:.6rem 3rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 20px rgba(0,0,0,.3)}

/* HEADER */
.header{padding:1rem 3rem;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border);flex-shrink:0;box-shadow:0 2px 20px rgba(0,0,0,.3)}
.live-chip{display:inline-flex;align-items:center;gap:.45rem;background:rgba(232,84,122,.12);border:1px solid rgba(232,84,122,.4);color:var(--coral);font-size:12px;font-weight:800;padding:4px 14px;border-radius:20px;font-family:'Nunito',sans-serif}
.ldot{width:7px;height:7px;border-radius:50%;background:var(--coral);animation:ldp 1.4s infinite}
@keyframes ldp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

/* MAIN */
.main{flex:1;display:grid;grid-template-columns:1fr 270px;overflow:hidden}

/* BOARD */
.board{padding:1rem 2rem 1rem 3rem;display:flex;flex-direction:column;gap:.6rem;overflow:hidden}
.row{background:var(--card);border-radius:var(--r);padding:1rem 1.5rem;display:flex;align-items:center;gap:1.3rem;border:1px solid var(--border);position:relative;overflow:hidden;animation:rowIn .5s ease forwards}
@keyframes rowIn{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)}}
.row:nth-child(2){animation-delay:.05s}.row:nth-child(3){animation-delay:.1s}
.row:nth-child(4){animation-delay:.15s}.row:nth-child(5){animation-delay:.2s}
.row.first{background:linear-gradient(135deg,var(--purpled),#0E0E2A);border-color:var(--purple);box-shadow:0 0 40px var(--purple-glow),0 0 0 1px rgba(91,91,214,.4)}
.row.first::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,var(--purple-glow),transparent)}
.row.second{background:var(--card2);border-color:#3A3A60}
.row.third{background:var(--card2);border-color:rgba(232,84,122,.3)}
.rank{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.7rem;min-width:46px;text-align:center;color:var(--muted);position:relative;z-index:1}
.row.first .rank{color:var(--purple)}.row.second .rank{color:#9090CC}.row.third .rank{color:var(--coral)}
.medal{font-size:1.6rem;min-width:34px;text-align:center;position:relative;z-index:1}
.info{flex:1;position:relative;z-index:1}
.team{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.2rem;color:var(--text);letter-spacing:-.01em}
.row.first .team{color:#fff}
.meta{font-size:12px;color:var(--muted);margin-top:.15rem}
.bar-col{flex:1.6;position:relative;z-index:1}
.bar-track{height:9px;background:rgba(255,255,255,.06);border-radius:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--purpled),var(--purple));transition:width 1.4s cubic-bezier(.34,1.2,.64,1)}
.row.second .bar-fill{background:linear-gradient(90deg,#6060AA,#9090CC)}
.row.third .bar-fill{background:linear-gradient(90deg,#A04060,var(--coral))}
.row:not(.first):not(.second):not(.third) .bar-fill{background:linear-gradient(90deg,#2A2A50,#4A4A70)}
.score-col{text-align:right;min-width:80px;position:relative;z-index:1}
.score-num{font-family:'Nunito',sans-serif;font-weight:900;font-size:2rem;line-height:1;color:var(--purple);letter-spacing:-.02em}
.row.second .score-num{color:#9090CC}.row.third .score-num{color:var(--coral)}
.row:not(.first):not(.second):not(.third) .score-num{color:var(--muted)}
.score-den{font-size:11px;color:var(--muted)}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;opacity:.4}
.empty-icon{font-size:4rem}.empty-text{font-family:'Nunito',sans-serif;font-weight:700;font-size:1.1rem;color:var(--muted)}

/* SIDEBAR */
.sidebar{border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:rgba(12,12,30,.7)}
.sb-hdr{padding:.9rem 1.1rem .7rem;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:.9rem;color:var(--text)}
.sb-sub{font-size:10px;color:var(--muted);margin-top:.1rem}
.rxn-feed{flex:1;overflow:hidden;display:flex;flex-direction:column;gap:.45rem;padding:.7rem 1.1rem;justify-content:flex-end}
.rxn-item{display:flex;align-items:center;gap:.55rem;padding:.45rem .7rem;background:rgba(255,255,255,.05);border-radius:12px;border:1px solid var(--border);animation:rxnIn .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes rxnIn{from{opacity:0;transform:scale(.8) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.rxn-emoji{font-size:1.3rem;flex-shrink:0}
.rxn-team{font-family:'Nunito',sans-serif;font-weight:800;font-size:.75rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rxn-time{font-size:10px;color:var(--muted)}
.no-rxn{text-align:center;color:var(--muted);font-size:12px;padding:2rem 1rem;opacity:.5}

/* SPONSOR FOOTER */
.sponsor-footer-dark{background:rgba(255,255,255,.06);border-top:1px solid rgba(255,255,255,.1);padding:.65rem 2rem;display:flex;align-items:center;justify-content:center;gap:.75rem;flex-shrink:0}
.sf-label-dark{font-size:10px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.1em;font-family:'Nunito',sans-serif;white-space:nowrap}

/* FOOTER */
.footer{padding:.5rem 3rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;flex-shrink:0}
.footer-count{font-size:12px;color:var(--muted)}
</style>
</head>

<script>
var MEDALS = ['&#x1F947;','&#x1F948;','&#x1F949;'];
var db = null;

try {
  firebase.initializeApp({apiKey:"AIzaSyBoxCE9DY4VCHiq8beeaGmX5237KiPuFWA",authDomain:"screenshot-trivia-night.firebaseapp.com",databaseURL:"https://screenshot-trivia-night-default-rtdb.firebaseio.com",projectId:"screenshot-trivia-night",storageBucket:"screenshot-trivia-night.firebasestorage.app",messagingSenderId:"482758352954",appId:"1:482758352954:web:832d1cba008bc0b789d503"});
  db = firebase.database();
} catch(e) { console.error('Firebase failed', e); }

function renderBoard(teams) {
  var el = document.getElementById('board');
  if (!teams || !teams.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">&#x1F3C6;</div><div class="empty-text">Waiting for teams&hellip;</div></div>';
    document.getElementById('footer-count').textContent = '';
    return;
  }
  var max = teams[0].score || 1;
  el.innerHTML = teams.map(function(t, i) {
    var cls = i === 0 ? 'row first' : i === 1 ? 'row second' : i === 2 ? 'row third' : 'row';
    var pct = max > 0 ? Math.round((t.score / max) * 100) : 0;
    var rounds = 'R1:' + (t.r0||0) + ' R2:' + (t.r1||0) + ' R3:' + (t.r2||0);
    return (
      '<div class="' + cls + '">' +
      '<div class="rank">' + (i+1) + '</div>' +
      '<div class="medal">' + (MEDALS[i] || '') + '</div>' +
      '<div class="info"><div class="team">' + t.team + '</div><div class="meta">' + rounds + (t.bonus ? ' &middot; &#x26A1;' + t.bonus : '') + '</div></div>' +
      '<div class="bar-col"><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div></div>' +
      '<div class="score-col"><div class="score-num">' + t.score + '</div><div class="score-den">pts</div></div>' +
      '</div>'
    );
  }).join('');
  document.getElementById('footer-count').textContent = teams.length + ' team' + (teams.length !== 1 ? 's' : '');
}

if (db) {
  // Live scores listener
  db.ref('live_scores').on('value', function(snap) {
    var data = snap.val() || {};
    var teams = Object.values(data).sort(function(a, b) { return b.score - a.score; });
    renderBoard(teams);
  });

  // Reactions listener
  db.ref('reactions').limitToLast(20).on('value', function(snap) {
    var data = snap.val() || {};
    var rxns = Object.values(data).sort(function(a, b) { return b.ts - a.ts; });
    var el = document.getElementById('rxn-feed');
    if (!rxns.length) {
      el.innerHTML = '<div class="no-rxn">Reactions will appear here as teams play</div>';
      return;
    }
    el.innerHTML = rxns.map(function(r) {
      return '<div class="rxn-item"><div class="rxn-emoji">' + (r.emoji || '&#x1F4AC;') + '</div><div class="rxn-team">' + r.team + '</div></div>';
    }).join('');
  });
}
</script>
