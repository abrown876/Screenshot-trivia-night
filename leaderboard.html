<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Leaderboard — Andrew's Birthday Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0A0A1A;
  --purple:#7C6EF6;
  --pink:#FF5C8A;
  --gold:#FFD700;
  --silver:#C0C0C0;
  --bronze:#CD7F32;
  --green:#34D399;
  --text:#F0F0FF;
  --text-dim:#8888BB;
  --border:rgba(124,110,246,.18);
  --font:'Outfit',sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height:100%;
  background:var(--bg);
  font-family:var(--font);
  color:var(--text);
  overflow:hidden;
}

body {
  display:flex;
  flex-direction:column;
  padding:2rem 3rem;
}

body::before {
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(124,110,246,.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(255,92,138,.1) 0%, transparent 50%);
  pointer-events:none;
  z-index:0;
}

/* Header */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:1.5rem;
  position:relative;
  z-index:1;
}

.header-left {
  display:flex;
  align-items:center;
  gap:1.5rem;
}

.logo {
  height:48px;
  width:auto;
}

.title-block {
  display:flex;
  flex-direction:column;
  gap:0.25rem;
}

.title {
  font-size:2.5rem;
  font-weight:900;
  background:linear-gradient(135deg, var(--purple), var(--pink));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1.1;
}

.subtitle {
  font-size:1rem;
  color:var(--text-dim);
  font-weight:600;
  letter-spacing:0.05em;
}

.header-right {
  display:flex;
  align-items:center;
  gap:1rem;
}

.live-badge {
  display:flex;
  align-items:center;
  gap:0.5rem;
  background:rgba(255,75,92,.15);
  border:1px solid rgba(255,75,92,.3);
  padding:0.5rem 1rem;
  border-radius:2rem;
  font-weight:700;
  font-size:0.9rem;
  color:#FF4B5C;
}

.live-dot {
  width:10px;
  height:10px;
  background:#FF4B5C;
  border-radius:50%;
  animation:pulse 1.5s infinite;
}

@keyframes pulse {
  0%, 100% { opacity:1; transform:scale(1); }
  50% { opacity:0.5; transform:scale(1.2); }
}

.player-count {
  font-size:1.1rem;
  color:var(--text-dim);
  font-weight:600;
}

.player-count span {
  color:var(--purple);
  font-weight:800;
}

/* Leaderboard */
.leaderboard {
  flex:1;
  display:flex;
  flex-direction:column;
  position:relative;
  z-index:1;
  overflow:hidden;
}

.lb-header {
  display:grid;
  grid-template-columns:80px 1fr 120px;
  padding:1rem 1.5rem;
  font-size:0.85rem;
  font-weight:700;
  color:var(--text-dim);
  text-transform:uppercase;
  letter-spacing:0.1em;
  border-bottom:1px solid var(--border);
}

.lb-list {
  flex:1;
  overflow-y:auto;
  padding:0.5rem 0;
}

.lb-row {
  display:grid;
  grid-template-columns:80px 1fr 120px;
  align-items:center;
  padding:1rem 1.5rem;
  border-radius:12px;
  margin:0.35rem 0;
  transition:all 0.3s ease;
  background:rgba(255,255,255,0.02);
}

.lb-row:nth-child(1) {
  background:linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,215,0,0.05));
  border:1px solid rgba(255,215,0,0.3);
}

.lb-row:nth-child(2) {
  background:linear-gradient(135deg, rgba(192,192,192,0.12), rgba(192,192,192,0.04));
  border:1px solid rgba(192,192,192,0.25);
}

.lb-row:nth-child(3) {
  background:linear-gradient(135deg, rgba(205,127,50,0.12), rgba(205,127,50,0.04));
  border:1px solid rgba(205,127,50,0.25);
}

.lb-rank {
  font-size:1.8rem;
  font-weight:900;
  width:50px;
  height:50px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  background:rgba(255,255,255,0.05);
}

.lb-row:nth-child(1) .lb-rank {
  background:linear-gradient(135deg, var(--gold), #FFA500);
  color:#1a1a2e;
}

.lb-row:nth-child(2) .lb-rank {
  background:linear-gradient(135deg, var(--silver), #A0A0A0);
  color:#1a1a2e;
}

.lb-row:nth-child(3) .lb-rank {
  background:linear-gradient(135deg, var(--bronze), #8B4513);
  color:#1a1a2e;
}

.lb-name {
  font-size:1.4rem;
  font-weight:700;
  padding-left:1rem;
}

.lb-row:nth-child(1) .lb-name {
  color:var(--gold);
}

.lb-score {
  font-size:1.6rem;
  font-weight:800;
  text-align:right;
  color:var(--purple);
}

.lb-row:nth-child(1) .lb-score {
  color:var(--gold);
}

/* Question indicator */
.question-indicator {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0.75rem;
  padding:1rem;
  background:rgba(124,110,246,0.1);
  border:1px solid var(--border);
  border-radius:12px;
  margin-top:1rem;
}

.q-label {
  font-size:1rem;
  color:var(--text-dim);
  font-weight:600;
}

.q-number {
  font-size:1.2rem;
  font-weight:800;
  color:var(--purple);
}

.q-status {
  font-size:0.9rem;
  padding:0.35rem 0.75rem;
  border-radius:1rem;
  font-weight:700;
}

.q-status.live {
  background:rgba(52,211,153,0.15);
  color:var(--green);
  border:1px solid rgba(52,211,153,0.3);
}

.q-status.waiting {
  background:rgba(136,136,187,0.15);
  color:var(--text-dim);
  border:1px solid rgba(136,136,187,0.3);
}

/* Empty state */
.lb-empty {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100%;
  color:var(--text-dim);
  font-size:1.5rem;
  gap:1rem;
}

.lb-empty-icon {
  font-size:4rem;
  opacity:0.5;
}

/* Footer */
.footer {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding-top:1rem;
  border-top:1px solid var(--border);
  margin-top:1rem;
  position:relative;
  z-index:1;
}

.sponsor {
  display:flex;
  align-items:center;
  gap:0.75rem;
  color:var(--text-dim);
  font-size:0.85rem;
  font-weight:600;
}

.sponsor-logo {
  height:36px;
  width:auto;
}

.powered-by {
  font-size:0.8rem;
  color:var(--text-muted);
  font-weight:600;
  letter-spacing:0.05em;
}

.powered-by span {
  color:var(--purple);
}

/* Animations */
@keyframes slideIn {
  from { opacity:0; transform:translateX(-20px); }
  to { opacity:1; transform:translateX(0); }
}

.lb-row {
  animation:slideIn 0.4s ease forwards;
}

.lb-row:nth-child(1) { animation-delay:0.05s; }
.lb-row:nth-child(2) { animation-delay:0.1s; }
.lb-row:nth-child(3) { animation-delay:0.15s; }
.lb-row:nth-child(4) { animation-delay:0.2s; }
.lb-row:nth-child(5) { animation-delay:0.25s; }
.lb-row:nth-child(6) { animation-delay:0.3s; }
.lb-row:nth-child(7) { animation-delay:0.35s; }
.lb-row:nth-child(8) { animation-delay:0.4s; }
.lb-row:nth-child(9) { animation-delay:0.45s; }
.lb-row:nth-child(10) { animation-delay:0.5s; }

/* Responsive for different screen sizes */
@media (max-width: 1200px) {
  body { padding:1.5rem 2rem; }
  .title { font-size:2rem; }
  .lb-name { font-size:1.2rem; }
  .lb-score { font-size:1.4rem; }
  .lb-rank { width:44px; height:44px; font-size:1.5rem; }
}

@media (max-width: 800px) {
  body { padding:1rem; }
  .title { font-size:1.5rem; }
  .header { flex-direction:column; gap:1rem; align-items:flex-start; }
  .lb-header { grid-template-columns:60px 1fr 80px; padding:0.75rem 1rem; }
  .lb-row { grid-template-columns:60px 1fr 80px; padding:0.75rem 1rem; }
  .lb-rank { width:38px; height:38px; font-size:1.2rem; }
  .lb-name { font-size:1rem; }
  .lb-score { font-size:1.2rem; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <img src="https://quiz.screenshotinteractive.com/logo.png" alt="Screenshot Interactive" class="logo" onerror="this.style.display='none'">
    <div class="title-block">
      <div class="title">🏆 Live Leaderboard</div>
      <div class="subtitle">Andrew's Birthday Quiz</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-badge">
      <div class="live-dot"></div>
      LIVE
    </div>
    <div class="player-count"><span id="player-count">0</span> Players</div>
  </div>
</div>

<div class="leaderboard">
  <div class="lb-header">
    <div>Rank</div>
    <div>Player</div>
    <div style="text-align:right">Score</div>
  </div>
  <div class="lb-list" id="lb-list">
    <div class="lb-empty">
      <div class="lb-empty-icon">👥</div>
      <div>Waiting for players...</div>
    </div>
  </div>
</div>

<div class="question-indicator">
  <span class="q-label">Current Question:</span>
  <span class="q-number" id="q-number">—</span>
  <span class="q-status waiting" id="q-status">Waiting</span>
</div>

<div class="footer">
  <div class="sponsor">
    <span>Sponsored by</span>
    <img src="chilitoswhite.png" alt="Chilitos" class="sponsor-logo" onerror="this.parentElement.innerHTML='<span>Chilitos Jamexican Food</span>'">
  </div>
  <div class="powered-by">Powered by <span>Screenshot Interactive</span></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
const $ = id => document.getElementById(id);

let db = null;
try {
  firebase.initializeApp({
    apiKey: "AIzaSyBoxCE9DY4VCHiq8beeaGmX5237KiPuFWA",
    authDomain: "screenshot-trivia-night.firebaseapp.com",
    databaseURL: "https://screenshot-trivia-night-default-rtdb.firebaseio.com",
    projectId: "screenshot-trivia-night"
  });
  db = firebase.database();
} catch(e) {
  console.warn('Firebase unavailable:', e.message);
}

// Listen for teams/scores updates
function startListening() {
  if (!db) return;
  
  // Listen for player scores
  db.ref('teams').on('value', snap => {
    const teams = snap.val() || {};
    const sorted = Object.entries(teams)
      .map(([k, v]) => ({ key: k, name: v.name || 'Player', score: v.score || 0 }))
      .sort((a, b) => b.score - a.score);
    
    $('player-count').textContent = sorted.length;
    
    if (sorted.length === 0) {
      $('lb-list').innerHTML = `
        <div class="lb-empty">
          <div class="lb-empty-icon">👥</div>
          <div>Waiting for players...</div>
        </div>`;
      return;
    }
    
    $('lb-list').innerHTML = sorted.map((p, i) => `
      <div class="lb-row">
        <div class="lb-rank">${i + 1}</div>
        <div class="lb-name">${escapeHtml(p.name)}</div>
        <div class="lb-score">${p.score}</div>
      </div>
    `).join('');
  });
  
  // Listen for game state
  db.ref('game').on('value', snap => {
    const game = snap.val();
    if (!game) {
      $('q-number').textContent = '—';
      $('q-status').textContent = 'Waiting';
      $('q-status').className = 'q-status waiting';
      return;
    }
    
    if (game.status === 'question') {
      $('q-number').textContent = `Q${(game.questionIndex || 0) + 1} of 10`;
      $('q-status').textContent = 'Live';
      $('q-status').className = 'q-status live';
    } else if (game.status === 'revealed') {
      $('q-number').textContent = `Q${(game.questionIndex || 0) + 1} of 10`;
      $('q-status').textContent = 'Revealed';
      $('q-status').className = 'q-status waiting';
    } else if (game.status === 'leaderboard') {
      $('q-status').textContent = 'Leaderboard';
      $('q-status').className = 'q-status live';
    } else if (game.status === 'ended') {
      $('q-status').textContent = 'Game Over';
      $('q-status').className = 'q-status waiting';
    } else {
      $('q-number').textContent = '—';
      $('q-status').textContent = 'Waiting';
      $('q-status').className = 'q-status waiting';
    }
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Start listening on load
startListening();
</script>
</body>
</html>
