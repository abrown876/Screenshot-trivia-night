<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Live Leaderboard — Andrew's Birthday Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080818;
  --surface:#10102A;--surface2:#181832;--surface3:#20203C;
  --purple:#7C6EF6;--purple-dim:#5B50C8;--purple-glow:rgba(124,110,246,.3);--purple-glow2:rgba(124,110,246,.12);
  --coral:#FF5C8A;--coral-glow:rgba(255,92,138,.25);
  --pink:#FF5C8A;
  --gold:#FFB740;
  --silver:#C0C0C0;
  --bronze:#CD7F32;
  --green:#3DDC84;--green-bg:rgba(61,220,132,.12);
  --red:#FF4B5C;--red-bg:rgba(255,75,92,.12);
  --text:#F0F0FF;--text-dim:#8888BB;--text-muted:#4A4A7A;
  --border:rgba(124,110,246,.18);--border2:rgba(124,110,246,.08);
  --r:16px;
  --font-display:'Outfit',sans-serif;
  --font-mono:'Space Mono',monospace;
  --font:'Outfit',sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height:100%;
  background:var(--bg);
  font-family:var(--font);
  color:var(--text);
  overflow:hidden;
}

body {
  display:grid;
  grid-template-columns:1fr 420px;
  grid-template-rows:auto 1fr auto;
  gap:1.5rem;
  padding:1.5rem 2rem;
}

body::before {
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(124,110,246,.12) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 0%, rgba(255,92,138,.08) 0%, transparent 50%);
  pointer-events:none;
  z-index:0;
}

/* Header - spans full width */
.header {
  grid-column:1 / -1;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:relative;
  z-index:1;
}

.header-left {
  display:flex;
  align-items:center;
  gap:1.25rem;
}

.logo {
  height:42px;
  width:auto;
}

.title {
  font-size:2rem;
  font-weight:900;
  background:linear-gradient(135deg,#fff 0%,#C4BEFF 45%,#FF5C8A 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

.header-right {
  display:flex;
  align-items:center;
  gap:1.5rem;
}

.live-badge {
  display:flex;
  align-items:center;
  gap:0.5rem;
  background:rgba(255,75,92,.15);
  border:1px solid rgba(255,75,92,.4);
  padding:0.6rem 1.25rem;
  border-radius:2rem;
  font-weight:800;
  font-size:1rem;
  color:var(--red);
  text-transform:uppercase;
  letter-spacing:0.05em;
}

.live-dot {
  width:12px;
  height:12px;
  background:var(--red);
  border-radius:50%;
  animation:pulse 1.2s infinite;
  box-shadow:0 0 12px var(--red);
}

@keyframes pulse {
  0%, 100% { opacity:1; transform:scale(1); }
  50% { opacity:0.6; transform:scale(1.3); }
}

.player-count {
  font-size:1.2rem;
  color:var(--text);
  font-weight:700;
  background:var(--surface);
  padding:0.6rem 1.25rem;
  border-radius:2rem;
  border:1px solid var(--border);
}

.player-count span {
  color:var(--purple);
  font-weight:900;
}

/* QR Code */
.qr-section {
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--surface);
  padding:0.5rem;
  border-radius:12px;
  border:2px solid var(--purple);
  box-shadow:0 0 20px rgba(124,110,246,.3);
}

.qr-code {
  width:80px;
  height:80px;
  border-radius:6px;
}

/* Main content area - Question display */
.main-area {
  display:flex;
  flex-direction:column;
  position:relative;
  z-index:1;
}

/* Question Card */
.question-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:2rem;
  transition:all 0.4s ease;
  height:100%;
  display:flex;
  flex-direction:column;
  position:relative;
}

.question-card.active {
  border-color:var(--purple);
  box-shadow:0 0 40px rgba(124,110,246,.2);
}

.question-card.revealed {
  border-color:var(--green);
  box-shadow:0 0 40px rgba(61,220,132,.2);
}

.q-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:1.5rem;
}

.q-number {
  font-size:1.1rem;
  font-weight:800;
  color:var(--purple);
  background:rgba(124,110,246,.15);
  padding:0.5rem 1rem;
  border-radius:2rem;
}

.q-timer {
  font-size:3rem;
  font-weight:900;
  color:var(--text);
  font-family:var(--font-mono);
  min-width:80px;
  text-align:center;
}

.q-timer.warning { color:var(--gold); }
.q-timer.danger { color:var(--red); animation:timerPulse 0.5s infinite; }

@keyframes timerPulse {
  0%, 100% { transform:scale(1); }
  50% { transform:scale(1.1); }
}

.q-text {
  font-size:1.8rem;
  font-weight:700;
  line-height:1.4;
  margin-bottom:2rem;
  flex:1;
}

.q-options {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1rem;
}

.q-opt {
  display:flex;
  align-items:center;
  gap:1rem;
  padding:1.25rem 1.5rem;
  background:rgba(255,255,255,.03);
  border:2px solid var(--border);
  border-radius:14px;
  font-size:1.15rem;
  font-weight:600;
  transition:all 0.3s ease;
}

.q-opt-letter {
  width:36px;
  height:36px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--purple);
  color:white;
  border-radius:8px;
  font-weight:800;
  font-size:1rem;
  flex-shrink:0;
}

.q-opt.correct {
  background:rgba(61,220,132,.15);
  border-color:var(--green);
  animation:correctPop 0.5s ease;
}

.q-opt.correct .q-opt-letter {
  background:var(--green);
}

@keyframes correctPop {
  0% { transform:scale(1); }
  50% { transform:scale(1.03); }
  100% { transform:scale(1); }
}

/* Answer reveal overlay */
.answer-reveal {
  display:none;
  position:absolute;
  inset:0;
  background:rgba(8,8,24,.95);
  border-radius:20px;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:1.5rem;
  animation:fadeIn 0.4s ease;
}

.answer-reveal.show { display:flex; }

@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}

.answer-reveal-icon {
  font-size:5rem;
  animation:bounceIn 0.6s ease;
}

@keyframes bounceIn {
  0% { transform:scale(0); }
  50% { transform:scale(1.2); }
  100% { transform:scale(1); }
}

.answer-reveal-text {
  font-size:2rem;
  font-weight:800;
  color:var(--green);
}

.answer-reveal-answer {
  font-size:1.5rem;
  font-weight:600;
  color:var(--text);
  background:rgba(61,220,132,.15);
  padding:1rem 2rem;
  border-radius:12px;
  border:1px solid rgba(61,220,132,.3);
}

/* Waiting state */
.waiting-state {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  flex:1;
  gap:1.5rem;
}

.waiting-icon {
  font-size:4rem;
  animation:float 2s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform:translateY(0); }
  50% { transform:translateY(-10px); }
}

.waiting-text {
  font-size:1.5rem;
  font-weight:700;
  color:var(--text-dim);
}

/* Leaderboard sidebar */
.leaderboard {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  position:relative;
  z-index:1;
}

.lb-title {
  font-size:1.3rem;
  font-weight:800;
  padding:1.25rem 1.5rem;
  border-bottom:1px solid var(--border);
  background:linear-gradient(135deg, rgba(124,110,246,.1), transparent);
}

.lb-list {
  flex:1;
  overflow-y:auto;
  padding:0.75rem;
}

.lb-row {
  display:grid;
  grid-template-columns:44px 1fr auto;
  align-items:center;
  gap:0.75rem;
  padding:0.75rem 1rem;
  border-radius:12px;
  margin-bottom:0.5rem;
  background:rgba(255,255,255,0.02);
  transition:all 0.3s ease;
  position:relative;
  overflow:hidden;
}

.lb-row::before {
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(90deg, transparent, rgba(124,110,246,.3), transparent);
  transform:translateX(-100%);
  transition:transform 0s;
}

.lb-row.score-up::before {
  animation:scoreFlash 0.8s ease;
}

@keyframes scoreFlash {
  0% { transform:translateX(-100%); }
  50% { transform:translateX(0); }
  100% { transform:translateX(100%); }
}

.lb-row.score-up {
  animation:rowPop 0.4s ease;
}

@keyframes rowPop {
  0% { transform:scale(1); }
  50% { transform:scale(1.02); background:rgba(124,110,246,.2); }
  100% { transform:scale(1); }
}

/* Top 3 styling */
.lb-row[data-rank="1"] {
  background:linear-gradient(135deg, rgba(255,183,64,.15), rgba(255,183,64,.05));
  border:1px solid rgba(255,183,64,.3);
}

.lb-row[data-rank="2"] {
  background:linear-gradient(135deg, rgba(192,192,192,.12), rgba(192,192,192,.04));
  border:1px solid rgba(192,192,192,.25);
}

.lb-row[data-rank="3"] {
  background:linear-gradient(135deg, rgba(205,127,50,.12), rgba(205,127,50,.04));
  border:1px solid rgba(205,127,50,.25);
}

.lb-rank {
  width:44px;
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  font-size:1.1rem;
  font-weight:900;
  background:rgba(255,255,255,.05);
}

.lb-row[data-rank="1"] .lb-rank {
  background:linear-gradient(135deg, var(--gold), #FFA500);
  color:#1a1a2e;
}

.lb-row[data-rank="2"] .lb-rank {
  background:linear-gradient(135deg, var(--silver), #A0A0A0);
  color:#1a1a2e;
}

.lb-row[data-rank="3"] .lb-rank {
  background:linear-gradient(135deg, var(--bronze), #8B4513);
  color:#1a1a2e;
}

.lb-name {
  font-size:1rem;
  font-weight:600;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.lb-row[data-rank="1"] .lb-name {
  color:var(--gold);
  font-weight:700;
}

.lb-score {
  font-size:1.1rem;
  font-weight:800;
  color:var(--purple);
  font-family:var(--font-mono);
  position:relative;
}

.lb-row[data-rank="1"] .lb-score {
  color:var(--gold);
}

.score-change {
  position:absolute;
  right:-30px;
  font-size:0.75rem;
  color:var(--green);
  font-weight:700;
  opacity:0;
  transition:opacity 0.3s;
}

.score-change.show {
  opacity:1;
  animation:scoreUp 1s ease forwards;
}

@keyframes scoreUp {
  0% { opacity:0; transform:translateY(10px); }
  20% { opacity:1; transform:translateY(0); }
  80% { opacity:1; }
  100% { opacity:0; }
}

.lb-empty {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100%;
  color:var(--text-dim);
  font-size:1.1rem;
  gap:0.75rem;
  padding:2rem;
}

.lb-empty-icon {
  font-size:2.5rem;
  opacity:0.5;
}

/* QR Code Section */
.qr-section {
  padding:1rem;
  border-top:1px solid var(--border);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0.5rem;
  background:linear-gradient(180deg, transparent, rgba(124,110,246,.05));
}

.qr-code {
  background:white;
  padding:8px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.qr-code canvas {
  display:block;
}

/* Footer */
.footer {
  grid-column:1 / -1;
  display:flex;
  justify-content:center;
  align-items:center;
  padding-top:0.75rem;
  border-top:1px solid var(--border);
  position:relative;
  z-index:1;
}

.powered-by {
  font-size:11px;
  color:var(--text-muted);
  font-weight:600;
  letter-spacing:0.06em;
  text-transform:uppercase;
}

.powered-by span {
  color:var(--purple);
}

/* Winner Podium - Game Over */
.winner-podium {
  display:none;
  position:fixed;
  inset:0;
  background:var(--bg);
  z-index:100;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:2rem;
}

.winner-podium.show {
  display:flex;
  animation:fadeIn 0.5s ease;
}

.winner-podium::before {
  content:'';
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse at 50% 30%, rgba(124,110,246,.2) 0%, transparent 50%),
    radial-gradient(ellipse at 30% 70%, rgba(255,183,64,.15) 0%, transparent 40%),
    radial-gradient(ellipse at 70% 70%, rgba(255,92,138,.15) 0%, transparent 40%);
  pointer-events:none;
}

.podium-title {
  font-size:3.5rem;
  font-weight:900;
  background:linear-gradient(135deg,#fff 0%,#C4BEFF 45%,#FF5C8A 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:1rem;
  position:relative;
  z-index:1;
  text-align:center;
}

.podium-subtitle {
  font-size:1.5rem;
  color:var(--text-dim);
  margin-bottom:3rem;
  position:relative;
  z-index:1;
}

.podium-places {
  display:flex;
  align-items:flex-end;
  justify-content:center;
  gap:1.5rem;
  margin-bottom:3rem;
  position:relative;
  z-index:1;
}

.podium-place {
  display:flex;
  flex-direction:column;
  align-items:center;
  animation:podiumRise 0.8s ease backwards;
}

.podium-place:nth-child(1) { animation-delay:0.4s; }
.podium-place:nth-child(2) { animation-delay:0.2s; }
.podium-place:nth-child(3) { animation-delay:0.6s; }

@keyframes podiumRise {
  from { opacity:0; transform:translateY(50px); }
  to { opacity:1; transform:translateY(0); }
}

.podium-trophy {
  font-size:4rem;
  margin-bottom:1rem;
  animation:trophyBounce 1s ease infinite;
  animation-delay:inherit;
}

.podium-place:nth-child(2) .podium-trophy {
  font-size:5.5rem;
  animation-delay:0.1s;
}

@keyframes trophyBounce {
  0%, 100% { transform:translateY(0) rotate(-3deg); }
  50% { transform:translateY(-10px) rotate(3deg); }
}

.podium-name {
  font-size:1.4rem;
  font-weight:800;
  color:var(--text);
  margin-bottom:0.5rem;
  text-align:center;
  max-width:180px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.podium-place:nth-child(2) .podium-name {
  font-size:1.8rem;
  color:var(--gold);
  max-width:220px;
}

.podium-score {
  font-size:1.2rem;
  font-weight:700;
  font-family:var(--font-mono);
  color:var(--purple);
  background:rgba(124,110,246,.15);
  padding:0.4rem 1rem;
  border-radius:2rem;
  margin-bottom:1rem;
}

.podium-place:nth-child(2) .podium-score {
  font-size:1.5rem;
  color:var(--gold);
  background:rgba(255,183,64,.15);
}

.podium-stand {
  width:140px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:2.5rem;
  font-weight:900;
  color:rgba(255,255,255,.9);
  border-radius:12px 12px 0 0;
  position:relative;
}

.podium-place:nth-child(1) .podium-stand {
  height:100px;
  background:linear-gradient(180deg, var(--silver), #8a8a8a);
}

.podium-place:nth-child(2) .podium-stand {
  height:140px;
  width:160px;
  background:linear-gradient(180deg, var(--gold), #cc9a00);
}

.podium-place:nth-child(3) .podium-stand {
  height:70px;
  background:linear-gradient(180deg, var(--bronze), #8B4513);
}

.podium-rest {
  position:relative;
  z-index:1;
  width:100%;
  max-width:600px;
}

.podium-rest-title {
  font-size:1.2rem;
  font-weight:800;
  color:var(--text);
  text-transform:uppercase;
  letter-spacing:0.1em;
  margin-bottom:1rem;
  text-align:center;
}

.podium-rest-list {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:1rem;
  max-height:280px;
  overflow-y:auto;
}

.podium-rest-row {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0.75rem 1rem;
  border-radius:8px;
  margin-bottom:0.5rem;
  background:rgba(255,255,255,.02);
}

.podium-rest-row.top3 {
  background:rgba(124,110,246,.1);
  border:1px solid rgba(124,110,246,.2);
}

.podium-rest-row:last-child { margin-bottom:0; }

.podium-rest-rank {
  font-weight:800;
  color:var(--text-dim);
  width:40px;
  font-size:1.1rem;
}

.podium-rest-row.top3 .podium-rest-rank {
  font-size:1.3rem;
}

.podium-rest-name {
  flex:1;
  font-weight:600;
  margin-left:0.75rem;
}

.podium-rest-row.top3 .podium-rest-name {
  font-weight:700;
  color:var(--text);
}

.podium-rest-score {
  font-weight:700;
  font-family:var(--font-mono);
  color:var(--purple);
}

.podium-footer {
  margin-top:2rem;
  font-size:0.9rem;
  color:var(--text-muted);
  position:relative;
  z-index:1;
}

.podium-footer span {
  color:var(--purple);
  font-weight:700;
}

/* Confetti container */
.confetti-container {
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1000;
  overflow:hidden;
}

.confetti {
  position:absolute;
  width:10px;
  height:10px;
  top:-20px;
  animation:confettiFall linear forwards;
}

@keyframes confettiFall {
  0% { transform:translateY(0) rotate(0deg); opacity:1; }
  100% { transform:translateY(100vh) rotate(720deg); opacity:0; }
}

/* Responsive */
@media (max-width: 1100px) {
  body {
    grid-template-columns:1fr 300px;
    padding:1rem;
    gap:1rem;
  }
  .q-text { font-size:1.4rem; }
  .q-options { grid-template-columns:1fr; }
}

@media (max-width: 800px) {
  body {
    grid-template-columns:1fr;
    grid-template-rows:auto auto 1fr auto;
  }
  .leaderboard { max-height:300px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <img src="https://quiz.screenshotinteractive.com/logo.png" alt="Screenshot" class="logo" onerror="this.style.display='none'">
    <div class="title">🎉 Andrew's Birthday Quiz</div>
  </div>
  <div class="header-right">
    <div class="qr-section">
      <svg class="qr-code" viewBox="0 0 37 37" xmlns="http://www.w3.org/2000/svg">
        <rect width="37" height="37" fill="#fff"/>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
const $ = id => document.getElementById(id);
const LTRS = ['A','B','C','D'];
const JOIN_URL = 'https://quiz.screenshotinteractive.com';

let db = null;
let previousScores = {};
let currentQuestionIdx = -1;

try {
  firebase.initializeApp({
    apiKey: "AIzaSyBoxCE9DY4VCHiq8beeaGmX5237KiPuFWA",
    authDomain: "screenshot-trivia-night.firebaseapp.com",
    databaseURL: "https://screenshot-trivia-night-default-rtdb.firebaseio.com",
    projectId: "screenshot-trivia-night"
  });
  db = firebase.database();
} catch(e) {
  console.warn('Firebase unavailable:', e.message);
}

// Generate QR Code
function generateQRCode() {
  const container = $('qr-code');
  if (container && typeof QRCode !== 'undefined') {
    QRCode.toCanvas(JOIN_URL, {
      width: 100,
      margin: 0,
      color: {
        dark: '#080818',
        light: '#FFFFFF'
      }
    }, (err, canvas) => {
      if (!err) {
        container.innerHTML = '';
        container.appendChild(canvas);
      }
    });
  }
}

// Generate QR on load
document.addEventListener('DOMContentLoaded', generateQRCode);

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Sound effects
function playCheer() {
  const sound = $('sound-cheer');
  if (sound) {
    sound.currentTime = 0;
    sound.volume = 0.5;
    sound.play().catch(() => {});
  }
}

function playWin() {
  const sound = $('sound-win');
  if (sound) {
    sound.currentTime = 0;
    sound.volume = 0.6;
    sound.play().catch(() => {});
  }
}

// Confetti burst for score changes
function triggerConfetti() {
  const container = $('confetti-container');
  const colors = ['#7C6EF6', '#FF5C8A', '#FFB740', '#3DDC84', '#FF4B5C'];
  
  for (let i = 0; i < 30; i++) {
    const confetti = document.createElement('div');
    confetti.className = 'confetti';
    confetti.style.left = Math.random() * 100 + '%';
    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
    confetti.style.animationDelay = Math.random() * 0.5 + 's';
    confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
    container.appendChild(confetti);
    
    setTimeout(() => confetti.remove(), 4000);
  }
}

// Update leaderboard with animations
function updateLeaderboard(teams) {
  const sorted = Object.entries(teams)
    .map(([k, v]) => ({ key: k, name: v.name || 'Player', score: v.score || 0 }))
    .sort((a, b) => b.score - a.score);
  
  $('player-count').textContent = sorted.length;
  
  if (sorted.length === 0) {
    $('lb-list').innerHTML = `
      <div class="lb-empty">
        <div class="lb-empty-icon">👥</div>
        <div>Waiting for players...</div>
      </div>`;
    return;
  }
  
  let hasScoreChange = false;
  const changedKeys = [];
  
  // Detect score changes
  sorted.forEach(p => {
    const prev = previousScores[p.key] || 0;
    if (p.score > prev) {
      hasScoreChange = true;
      changedKeys.push(p.key);
    }
  });
  
  // Update previous scores
  sorted.forEach(p => { previousScores[p.key] = p.score; });
  
  // Trigger confetti on any score change
  if (hasScoreChange) {
    triggerConfetti();
  }
  
  $('lb-list').innerHTML = sorted.map((p, i) => {
    const rank = i + 1;
    const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
    const isChanged = changedKeys.includes(p.key);
    
    return `
      <div class="lb-row ${isChanged ? 'score-up' : ''}" data-rank="${rank}">
        <div class="lb-rank">${medal}</div>
        <div class="lb-name">${escapeHtml(p.name)}</div>
        <div class="lb-score">
          ${p.score}
          <span class="score-change ${isChanged ? 'show' : ''}">+10</span>
        </div>
      </div>`;
  }).join('');
}

// Show question
function showQuestion(game) {
  $('waiting-state').style.display = 'none';
  $('question-content').style.display = 'block';
  $('answer-reveal').classList.remove('show');
  $('winner-podium').classList.remove('show');
  
  const card = $('question-card');
  card.classList.add('active');
  card.classList.remove('revealed');
  
  currentQuestionIdx = game.questionIndex;
  
  $('q-number').textContent = `Q${currentQuestionIdx + 1} of 20`;
  $('q-text').textContent = game.question;
  $('q-timer').textContent = game.timer || 10;
  $('q-timer').className = 'q-timer';
  
  $('q-options').innerHTML = game.options.map((opt, i) => `
    <div class="q-opt" data-idx="${i}">
      <span class="q-opt-letter">${LTRS[i]}</span>
      <span>${escapeHtml(opt)}</span>
    </div>
  `).join('');
}

// Reveal answer
function revealAnswer(game) {
  const card = $('question-card');
  card.classList.remove('active');
  card.classList.add('revealed');
  
  const correctIdx = game.correctAnswer;
  const correctOpt = game.options[correctIdx];
  
  // Highlight correct option
  document.querySelectorAll('.q-opt').forEach((opt, i) => {
    if (i === correctIdx) {
      opt.classList.add('correct');
    }
  });
  
  // Show reveal overlay
  $('correct-answer').textContent = correctOpt;
  $('answer-reveal').classList.add('show');
  
  // Play cheer sound
  playCheer();
  
  // Trigger confetti for reveal
  triggerConfetti();
}

// Show waiting state
function showWaiting(message) {
  $('waiting-state').style.display = 'flex';
  $('question-content').style.display = 'none';
  $('answer-reveal').classList.remove('show');
  $('question-card').classList.remove('active', 'revealed');
  $('winner-podium').classList.remove('show');
  
  $('waiting-state').innerHTML = `
    <div class="waiting-icon">🎮</div>
    <div class="waiting-text">${message || 'Waiting for host...'}</div>
  `;
}

// Show leaderboard focus
function showLeaderboardMode() {
  $('waiting-state').style.display = 'flex';
  $('question-content').style.display = 'none';
  $('answer-reveal').classList.remove('show');
  $('question-card').classList.remove('active');
  $('question-card').classList.add('revealed');
  
  $('waiting-state').innerHTML = `
    <div class="waiting-icon">🏆</div>
    <div class="waiting-text">Check the Leaderboard!</div>
  `;
  
  triggerConfetti();
}

// Show game ended with winner podium
function showGameEnded() {
  // Get sorted players
  const sorted = Object.entries(previousScores)
    .map(([k, score]) => {
      // Try to get name from existing leaderboard
      const existingRow = document.querySelector(`.lb-row .lb-name`);
      return { key: k, score };
    });
  
  // Re-fetch teams for names
  if (db) {
    db.ref('teams').once('value', snap => {
      const teams = snap.val() || {};
      const players = Object.entries(teams)
        .map(([k, v]) => ({ key: k, name: v.name || 'Player', score: v.score || 0 }))
        .sort((a, b) => b.score - a.score);
      
      if (players.length === 0) {
        // No players, just show basic game over
        $('waiting-state').style.display = 'flex';
        $('question-content').style.display = 'none';
        $('answer-reveal').classList.remove('show');
        $('waiting-state').innerHTML = `
          <div class="waiting-icon">🎉</div>
          <div class="waiting-text">Game Over! Thanks for playing!</div>
        `;
        return;
      }
      
      // Build podium
      const top3 = players.slice(0, 3);
      const rest = players.slice(3);
      
      // Podium order: 2nd, 1st, 3rd (for visual layout)
      const trophies = ['🥈', '🥇', '🥉'];
      const podiumOrder = [top3[1], top3[0], top3[2]].filter(Boolean);
      
      let podiumHTML = '';
      
      // If we have at least 2nd place
      if (top3[1]) {
        podiumHTML += `
          <div class="podium-place">
            <div class="podium-trophy">🥈</div>
            <div class="podium-name">${escapeHtml(top3[1].name)}</div>
            <div class="podium-score">${top3[1].score} pts</div>
            <div class="podium-stand">2</div>
          </div>`;
      }
      
      // 1st place (center, always if we have players)
      if (top3[0]) {
        podiumHTML += `
          <div class="podium-place">
            <div class="podium-trophy">🏆</div>
            <div class="podium-name">${escapeHtml(top3[0].name)}</div>
            <div class="podium-score">${top3[0].score} pts</div>
            <div class="podium-stand">1</div>
          </div>`;
      }
      
      // 3rd place
      if (top3[2]) {
        podiumHTML += `
          <div class="podium-place">
            <div class="podium-trophy">🥉</div>
            <div class="podium-name">${escapeHtml(top3[2].name)}</div>
            <div class="podium-score">${top3[2].score} pts</div>
            <div class="podium-stand">3</div>
          </div>`;
      }
      
      $('podium-places').innerHTML = podiumHTML;
      
      // Rest of players (everyone ranked)
      $('podium-rest').style.display = 'block';
      $('podium-rest-title').textContent = 'Final Standings';
      $('podium-rest-list').innerHTML = players.map((p, i) => {
        const rank = i + 1;
        const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '';
        const isTop3 = rank <= 3;
        return `
          <div class="podium-rest-row ${isTop3 ? 'top3' : ''}">
            <span class="podium-rest-rank">${medal || rank}</span>
            <span class="podium-rest-name">${escapeHtml(p.name)}</span>
            <span class="podium-rest-score">${p.score} pts</span>
          </div>
        `;
      }).join('');
      
      // Show podium overlay
      $('winner-podium').classList.add('show');
      
      // Play victory sound
      playWin();
      
      // Big confetti celebration
      for (let i = 0; i < 5; i++) {
        setTimeout(() => triggerConfetti(), i * 400);
      }
    });
  }
}

// Start listening
function startListening() {
  if (!db) return;
  
  // Listen for player scores
  db.ref('teams').on('value', snap => {
    const teams = snap.val() || {};
    updateLeaderboard(teams);
  });
  
  // Listen for game state
  db.ref('game').on('value', snap => {
    const game = snap.val();
    
    if (!game) {
      showWaiting('Waiting for host to start...');
      return;
    }
    
    // Update timer display
    if (game.timer !== undefined && game.status === 'question') {
      const timerEl = $('q-timer');
      timerEl.textContent = game.timer;
      timerEl.className = 'q-timer';
      if (game.timer <= 3) timerEl.classList.add('danger');
      else if (game.timer <= 5) timerEl.classList.add('warning');
    }
    
    if (game.status === 'question' && game.questionIndex >= 0) {
      showQuestion(game);
    } else if (game.status === 'revealed' && game.revealed) {
      revealAnswer(game);
    } else if (game.status === 'leaderboard') {
      showLeaderboardMode();
    } else if (game.status === 'ended') {
      showGameEnded();
    } else if (game.status === 'waiting') {
      showWaiting('Get ready! Next question coming soon...');
    } else {
      showWaiting('Waiting for host...');
    }
  });
}

// Start on load
startListening();
</script>
